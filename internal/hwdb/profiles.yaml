# Ventd hardware fingerprint database.
#
# Each entry matches a board via DMI/SMBIOS fields (from /sys/class/dmi/id/)
# and optional hwmon / PCI / CPU identifiers, then proposes an ordered list
# of kernel modules to load for fan-controller access.
#
# Match semantics (see internal/hwdb/hwdb.go): exact > prefix > wildcard
# (substring). Empty fields are wildcards. Entries with every match field
# empty never match.
#
# Verification:
#   unverified: true  — chip / module mapping not confirmed against a
#                       trusted source. The entry is retained for prefix /
#                       wildcard coverage but callers should surface it as
#                       tentative in diagnostics.
#
# Do not fabricate chip_hex_id values. Leave the field empty when the
# specific chip on a board cannot be confirmed.

# ── Ported from internal/hwmon/autoload.go knownDriverNeeds DMITriggers ──

- board_vendor: "Micro-Star International"
  board_name: "MAG"
  modules: [nct6687]
  notes: "MSI MAG series boards (Z490/Z590/Z690/Z790, B550/X570/B650/X670): NCT6687D Super I/O. In-kernel nct6683 exposes read-only PWM; out-of-tree nct6687 required for control."

- board_vendor: "Micro-Star International"
  board_name: "MPG"
  modules: [nct6687]
  notes: "MSI MPG series boards: NCT6687D Super I/O. Same driver requirement as MAG series."

- board_vendor: "Gigabyte Technology"
  modules: [it87]
  notes: "Gigabyte AMD boards (Aorus, Gaming X, UD) almost universally route fan headers through IT8688E, which the in-kernel it87 driver does not recognise; the out-of-tree fork handles this chip and the related IT8689E."
  unverified: true

