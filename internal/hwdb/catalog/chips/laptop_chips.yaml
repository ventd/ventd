schema_version: "1.2"

# Laptop/platform driver chip profiles.
# Each chip name matches /sys/class/hwmon/*/name for platform drivers.

chip_profiles:
  - name: "dell_smm"
    inherits_driver: "dell-smm-hwmon"
    description: "Dell SMM hwmon — /sys/class/hwmon/*/name value for dell-smm-hwmon driver."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/dell-smm-hwmon.html"

  - name: "alienware_wmi"
    inherits_driver: "alienware-wmi-wmax"
    description: "Alienware / Dell-G WMAX WMI hwmon — /sys/class/hwmon/*/name registered by the mainline alienware-wmi-wmax driver (manual pwm + per-fan boost + platform_profile/G-Mode)."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://github.com/torvalds/linux/blob/master/drivers/platform/x86/dell/alienware-wmi-wmax.c (devm_hwmon_device_register_with_info name='alienware_wmi')"

  - name: "steamdeck_hwmon"
    inherits_driver: "steamdeck-hwmon"
    description: "Steam Deck hwmon — /sys/class/hwmon/*/name value for steamdeck-hwmon driver."
    overrides: {}
    channel_overrides: {}
    citations: []

  - name: "macsmc-hwmon"
    inherits_driver: "macsmc-hwmon"
    description: "Apple Silicon SMC hwmon — /sys/class/hwmon/*/name value for macsmc-hwmon driver (mainlined Linux 6.19+)."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://github.com/AsahiLinux/linux (driver tree)"
      - "https://asahilinux.org/2025/12/progress-report-6-18/ (mainline landing)"

  - name: "pwmfan"
    inherits_driver: "pwm-fan"
    description: "Generic devicetree pwm-fan — /sys/class/hwmon/*/name value for pwm-fan driver on SBCs."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/pwm-fan.html"

  - name: "aquacomputer_d5next"
    inherits_driver: "aquacomputer_d5next"
    description: "Aqua Computer USB-HID cooler/sensor fleet — hwmon name value for aquacomputer_d5next driver (mainlined Linux 5.15+). Covers D5 Next, Octo, Quadro, Aquaero 5/6, Aquastream XT/Ultimate, Farbwerk variants, Leakshield, flow meters."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://github.com/aleksamagicka/aquacomputer_d5next-hwmon"

  - name: "asus_rog_ryujin"
    inherits_driver: "asus_rog_ryujin"
    description: "ASUS ROG Ryujin II AIO HID — hwmon name for asus_rog_ryujin driver (mainlined Linux 6.9). Covers Ryujin II 360 confirmed + Ryujin II 240 untested."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://github.com/aleksamagicka/asus_rog_ryujin-hwmon"

  - name: "gigabyte_waterforce"
    inherits_driver: "gigabyte_waterforce"
    description: "Gigabyte AORUS Waterforce X-series AIO HID — hwmon name for gigabyte_waterforce driver (mainlined Linux 6.8). Covers X240, X280, X360."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://github.com/aleksamagicka/gigabyte_waterforce-hwmon"

  # ── wave 12: mainline NZXT + Corsair USB-HID cooler/PSU hwmon ─────────
  - name: "nzxtsmart2"
    inherits_driver: "nzxt-smart2"
    description: "NZXT RGB & Fan Controller / Smart Device v2 / H1 V2 — hwmon name for nzxt-smart2 driver. Writable pwm[1-3]."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/nzxt-smart2.html"

  - name: "kraken2"
    inherits_driver: "nzxt-kraken2"
    description: "NZXT Kraken X42/X52/X62/X72 AIO — hwmon name for nzxt-kraken2 driver. Monitoring only (liquid temp + pump/fan RPM)."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/nzxt-kraken2.html"

  - name: "x53"
    inherits_driver: "nzxt-kraken3"
    description: "NZXT Kraken X53/X63/X73 AIO — hwmon name for nzxt-kraken3 driver. Pump PWM control (manual + liquid-temp curve)."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/nzxt-kraken3.html"

  - name: "z53"
    inherits_driver: "nzxt-kraken3"
    description: "NZXT Kraken Z53/Z63/Z73 AIO — hwmon name for nzxt-kraken3 driver. Pump + optional case fan PWM control."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/nzxt-kraken3.html"

  - name: "kraken2023"
    inherits_driver: "nzxt-kraken3"
    description: "NZXT Kraken 2023 AIO — hwmon name for nzxt-kraken3 driver. Pump + optional case fan PWM control."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/nzxt-kraken3.html"

  - name: "kraken2023elite"
    inherits_driver: "nzxt-kraken3"
    description: "NZXT Kraken 2023 Elite AIO — hwmon name for nzxt-kraken3 driver. Pump + optional case fan PWM control."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/nzxt-kraken3.html"

  - name: "corsaircpro"
    inherits_driver: "corsair-cpro"
    description: "Corsair Commander Pro — hwmon name for corsair-cpro driver. Writable pwm[1-6], fan[1-6]_target, temp[1-4]."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/corsair-cpro.html"

  - name: "corsairpsu"
    inherits_driver: "corsair-psu"
    description: "Corsair HXi/RMi digital PSU — hwmon name for corsair-psu driver. Read-only fan (pwm1 RO) + rail/temp telemetry."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/corsair-psu.html"

  # ── wave 13: x86 handheld EC hwmon ───────────────────────────────────
  - name: "oxp_ec"
    inherits_driver: "oxpec"
    description: "OneXPlayer/AOKZOE/AYANEO/OrangePi-NEO handheld EC — hwmon name for mainline oxpec driver. Writable pwm1 (manual/auto)."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://github.com/torvalds/linux/blob/master/drivers/platform/x86/oxpec.c"

  - name: "aynec"
    inherits_driver: "ayn-platform"
    description: "Ayn Loki handheld EC — hwmon name for OOT ayn-platform driver (DKMS). Writable pwm1 (manual/auto)."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://github.com/ShadowBlip/ayn-platform"

  - name: "asus_ec"
    inherits_driver: "asus-ec-sensors"
    description: "ASUS EC sensors — /sys/class/hwmon/*/name value. Read-only EC sensors; fan control via Super I/O."
    overrides: {}
    channel_overrides: {}
    citations: []

  - name: "asus-ec-sensors"
    inherits_driver: "asus-ec-sensors"
    description: "ASUS EC sensors (board profile reference name, hyphenated form). Same driver as asus_ec; referenced by board profiles in additional_controllers. Read-only supplementary temps; fan control via primary Super I/O."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/asus_ec.html"

  - name: "hp_wmi"
    inherits_driver: "hp-wmi-sensors"
    description: "HP WMI sensors — /sys/class/hwmon/*/name value. Read-only on all HP consumer/business models."
    overrides: {}
    channel_overrides: {}
    citations: []

  - name: "coretemp"
    inherits_driver: "coretemp"
    description: "Intel per-core temperature — /sys/class/hwmon/*/name value."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/coretemp.html"

  - name: "k10temp"
    inherits_driver: "k10temp"
    description: "AMD CPU Tctl/Tdie temperature — /sys/class/hwmon/*/name value."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/k10temp.html"
