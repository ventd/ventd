schema_version: "1.2"

# ITE IT87xx chip profiles — ASRock, Gigabyte, some MSI Intel boards.
# All inherit from the it87 driver (mainline or OOT frankcrawford/it87).
# Polarity probe is required for all ITE chips due to known BIOS misconfiguration.

chip_profiles:
  - name: "it8603"
    inherits_driver: "it87"
    description: "ITE IT8603E — common on recent ASRock AMD boards. Does NOT support pwm_enable=0 (full-speed mode absent)."
    overrides:
      pwm_enable_modes:
        "1": "manual"
        "2": "auto_trip_points"
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/it87.html"

  - name: "it8620"
    inherits_driver: "it87"
    description: "ITE IT8620E — Gigabyte AM4/Intel boards with dual Super I/O."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/it87.html"

  - name: "it8628"
    inherits_driver: "it87"
    description: "ITE IT8628E — common on Gigabyte X570/B550/X670 Aorus boards."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/it87.html"

  - name: "it8665"
    inherits_driver: "it87"
    description: "ITE IT8665E — some ASRock boards."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/it87.html"

  - name: "it8686"
    inherits_driver: "it87"
    description: "ITE IT8686E — Gigabyte B450/B550 Aorus boards."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/it87.html"

  - name: "it8688"
    inherits_driver: "it87"
    description: "ITE IT8688E — Gigabyte X470/X570 Aorus boards (second Super I/O)."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/it87.html"

  - name: "it8689"
    inherits_driver: "it87"
    description: "ITE IT8689E — newer Gigabyte boards. Requires force_id=0x8689 and ignore_resource_conflict=1. Some Gigabyte boards: reads OK, writes ignored (separate fan-control chip)."
    overrides:
      capability: "rw_quirk"
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/it87.html"
      - "https://github.com/frankcrawford/it87"

  - name: "it8792"
    inherits_driver: "it87"
    description: "ITE IT8792E — secondary Super I/O on Gigabyte dual-chip boards (X670E Aorus Master, B550 Aorus Master). Accompanies a primary IT8689/IT8688 chip. Requires frankcrawford/it87 OOT driver."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://github.com/frankcrawford/it87"
      - "https://github.com/frankcrawford/it87/issues/96"

  - name: "it8705"
    inherits_driver: "it87"
    description: "ITE IT8705F — legacy Super I/O, pre-2010 boards."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/it87.html"

  - name: "it8712"
    inherits_driver: "it87"
    description: "ITE IT8712F — legacy Super I/O."
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/it87.html"

  - name: "it5570"
    inherits_driver: "it5570-fan"  # OOT driver, not mainline
    description: "ITE IT5570 EC — programmable embedded controller (8051
      core) found in many AMD Phoenix/Hawk Point mini-PCs from Beelink,
      MINISFORUM, AceMagic, GMKtec, GEEKOM, AOOSTAR. NOT recognised by
      mainline it87. Requires OOT passiveEndeavour/it5570-fan DKMS module.
      Detection: SIO probe at 0x4E returns chip ID 0x5570."
    overrides:
      pwm_enable_modes:
        "0": "auto_ec_curve"   # write 0 to register 0x0F = return to EC firmware curve
        "1": "manual"          # write 1-100 to register 0x0F = manual duty %
    channel_overrides: {}
    citations:
      - "https://github.com/passiveEndeavour/it5570-fan (OOT driver, AceMagic W1 reference)"
      - "https://github.com/lm-sensors/lm-sensors/issues/411 (chip ID 0x5570 unrecognised by mainline)"
      - "https://github.com/frankcrawford/it87/issues/49 (frankcrawford/it87 explicitly does not target IT5570)"

  - name: "it8613"
    inherits_driver: "it87"
    description: "ITE IT8613E Super I/O — Intel Alder Lake-N / Twin Lake
      mini-PCs (Beelink Mini S, Topton, CWWK, AOOSTAR R7). Mainline it87
      does NOT recognise by chip ID — requires modprobe arg
      `force_id=0x8622` (alias to IT8622E). Kernel ≥6.2 additionally
      requires `ignore_resource_conflict=1` and `mmio=off` to avoid the
      pwm_enable=0 stuck-zero regression."
    overrides:
      requires_modprobe_args:
        - "force_id=0x8622"
    channel_overrides: {}
    citations:
      - "https://forum.proxmox.com/threads/new-kernel-6-2-16-4-pve-brought-pwmconfig-problem-with-ite-it8613e.130721/ (kernel 6.2+ regression)"
      - "https://wiki.niziak.spox.org/hw:server:aoostar_r7 (AOOSTAR R7 5825U IT8613E verified working with frankcrawford/it87)"
      - "https://blog.croitor.eu/posts/proxmox_beelink_s12_sensors/ (Beelink Mini S12 N100 IT8613E sensors-detect output)"
