  - name: "nct6775"
    inherits_driver: "nct6775"
    description: "Nuvoton NCT6775F — older AMD/Intel boards (also W83677HG-I)"
    overrides:
      pwm_enable_modes:
        "0": "full_speed"
        "1": "manual"
        "2": "thermal_cruise"
        "3": "fan_speed_cruise"
        "4": "smart_fan_iii"
        "5": "smart_fan_iv"
    channel_overrides: {}
