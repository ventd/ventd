schema_version: "1.0"

# Nuvoton NCT6775 family chip profiles — modern AMD/Intel desktops.
# Each chip name corresponds to the value in /sys/class/hwmon/*/name.
# All inherit from the nct6775 driver; specific overrides noted per chip.

chip_profiles:
  - name: "nct6798"
    inherits_driver: "nct6775"
    description: "Nuvoton NCT6798D — AMD X670/B650 and Intel Z690/Z790 boards (ASUS, MSI, Gigabyte)"
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/nct6775.html"

  - name: "nct6799"
    inherits_driver: "nct6775"
    description: "Nuvoton NCT6799D — Intel Z890/B860 boards"
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/nct6775.html"

  - name: "nct6796"
    inherits_driver: "nct6775"
    description: "Nuvoton NCT6796D — Intel Z490/Z590 boards"
    overrides: {}
    channel_overrides: {}
    citations:
      - "https://docs.kernel.org/hwmon/nct6775.html"

