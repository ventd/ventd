schema_version: "1.0"

driver_profiles:
  - module: "nct6683"
    family: "nuvoton-superio-ro"
    description: "Nuvoton NCT6683 mainline — READ-ONLY by design (Intel firmware NDA). Exposes sensors only. OOT forks (nct6687d/nct6686d) provide RW access."
    capability: "ro_pending_oot"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes:
      "1": "manual"
    off_behaviour: "stops"
    polling_latency_ms_hint: 50
    recommended_alternative_driver:
      module: "nct6687d"
      source: "github.com/Fred78290/nct6687d"
      install_method: "dkms"
      package_hint: "nct6687d-dkms"
      reason: "Mainline nct6683 is read-only by Nuvoton design (Intel firmware register layout held under NDA). nct6687d adds RW via reverse-engineered Windows register layout."
      applies_to_boards:
        - "msi"
        - "asrock"
        - "intel-dh"
        - "amd-bc-250"
      module_args_hint: []
    conflicts_with_userspace: []
    fan_control_capable: false
    fan_control_via: "nct6687d"
    required_modprobe_args: []
    pwm_polarity_reservation: "probe_required"
    exit_behaviour: "force_max"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: null
    citations:
      - "https://docs.kernel.org/hwmon/nct6683.html"
      - "https://github.com/Fred78290/nct6687d"
