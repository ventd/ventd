schema_version: "1.0"

driver_profiles:
  - module: "dell-smm-hwmon"
    family: "dell-smm"
    description: "Dell SMM fan controller — Dell laptops and some desktops. PWM unit is fan-state index (step_0_N), NOT duty-0-255. SMM calls can take 200-500ms."
    capability: "rw_step"
    pwm_unit: "step_0_N"
    pwm_unit_max: 2
    pwm_enable_modes:
      "1": "manual"
      "2": "bios_auto"
    off_behaviour: "state_off"
    polling_latency_ms_hint: 500
    recommended_alternative_driver: null
    conflicts_with_userspace: []
    fan_control_capable: true
    fan_control_via: null
    required_modprobe_args: []
    pwm_polarity_reservation: "not_applicable"
    exit_behaviour: "restore_auto"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: false
    citations:
      - "https://docs.kernel.org/hwmon/dell-smm-hwmon.html"
