schema_version: "1.2"

driver_profiles:
  - module: "dell-smm-hwmon"
    family: "dell-smm"
    description: "Dell SMM fan controller — Dell laptops and some desktops. PWM unit is fan-state index (step_0_N), NOT duty-0-255. Three discrete states (0=OFF, 1=LOW, 2=HIGH) when the machine is in i8k_whitelist_fan_control; non-whitelisted Dells lose state 2 to BIOS thermal reassert. SMM calls can take 200-500ms. v7.0.0-ventd.3 (ventd-org fork) adds whitelist entries, makes pwm_enable readable on whitelisted machines, and gates pwm_enable=2 fallback to set_fan(i8k_fan_max) on non-whitelisted machines."
    capability: "rw_step"
    pwm_unit: "step_0_N"
    pwm_unit_max: 2
    state_quantized_n: 3
    pwm_enable_modes:
      "1": "manual"
      "2": "bios_auto"
    off_behaviour: "state_off"
    polling_latency_ms_hint: 500
    recommended_alternative_driver:
      module: "dell-smm-hwmon"
      source: "github.com/ventd/dell-smm-hwmon-dkms"
      install_method: "dkms"
      package_hint: "dell-smm-hwmon-dkms"
      reason: "In-tree dell_smm_hwmon EINVALs the standard hwmon auto-restore call on every Dell not in i8k_whitelist_fan_control (most Latitudes / Inspirons / Vostros), audibly spikes the fan on every manual-mode transition, and collapses 'unimplemented SMM op' into the same -EINVAL as 'rejected argument' so callers can't tell them apart. The ventd downstream packages a patched build of the same module; depmod's /updates/dkms preference makes it shadow the in-tree driver with no blacklist drop-in needed."
      applies_to_boards:
        - "dell-laptop"
      module_args_hint: []
    conflicts_with_userspace: []
    fan_control_capable: true
    fan_control_via: null
    required_modprobe_args: []
    pwm_polarity_reservation: "not_applicable"
    exit_behaviour: "restore_auto"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: false
    citations:
      - "https://docs.kernel.org/hwmon/dell-smm-hwmon.html"
      - "https://github.com/ventd/dell-smm-hwmon-dkms/releases/tag/v7.0.0-ventd.3"
