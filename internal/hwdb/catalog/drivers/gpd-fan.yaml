schema_version: "1.2"

driver_profiles:
  - module: "gpd-fan"
    family: "gpd-handheld"
    description: "GPD handheld fan controller — GPD Win, Win Max, Pocket series. Entering manual mode forces pwm=255 as safety default; userspace must immediately follow with desired value."
    capability: "rw_full"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes:
      "0": "full_speed"
      "1": "manual"
      "2": "ec_auto"
    off_behaviour: "forces_max"
    polling_latency_ms_hint: 20
    recommended_alternative_driver: null
    conflicts_with_userspace: []
    fan_control_capable: true
    fan_control_via: null
    required_modprobe_args: []
    pwm_polarity_reservation: "static_normal"
    exit_behaviour: "restore_auto"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: false
    citations:
      - "https://docs.kernel.org/hwmon/gpd-fan.html"
