schema_version: "1.2"

driver_profiles:
  - module: "gigabyte_waterforce"
    family: "gigabyte-aio"
    description: |
      Gigabyte AORUS Waterforce X-series AIO HID driver (aleksamagicka,
      mainline since kernel 6.8). Supported: AORUS Waterforce X240, X280,
      X360. Exposes pump RPM, fan RPM, and 0-100 duty PWM via standard
      hwmon. aleksamagicka is the upstream maintainer — coordinate via
      Tested-by patches.
    capability: "rw_full"
    pwm_unit: "percentage_0_100"
    pwm_unit_max: null
    pwm_enable_modes:
      "1": "manual"
      "2": "device_auto"
    off_behaviour: "stops"
    polling_latency_ms_hint: 100
    recommended_alternative_driver: null
    conflicts_with_userspace:
      - daemon: "liquidctl"
        detection: "pgrep -x liquidctld"
        resolution: "coexist_warning"
        reason: "Gigabyte AORUS Engine (Windows) and liquidctl on Linux both talk this HID interface; mainline driver coexistence is best handled by stopping liquidctl on PWM ownership."
    fan_control_capable: true
    fan_control_via: null
    kernel_version:
      min: "6.8"
    required_modprobe_args: []
    pwm_polarity_reservation: "static_normal"
    exit_behaviour: "restore_auto"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: false
    citations:
      - "https://github.com/aleksamagicka/gigabyte_waterforce-hwmon (canonical out-of-tree dev tree)"
      - "https://docs.kernel.org/hwmon/gigabyte_waterforce.html (mainline docs)"
