schema_version: "1.2"

driver_profiles:
  - module: "asus_rog_ryujin"
    family: "asus-rog-aio"
    description: |
      ASUS ROG Ryujin AIO HID driver (aleksamagicka, mainline since kernel
      6.9). Confirmed support: ROG Ryujin II 360. Ryujin II 240 very likely
      supported per upstream maintainer (lacking user confirmation). Ryujin
      III models pending. Exposes pump RPM, fan RPM, and pwm0..pwm6 (0-255
      duty) via standard hwmon. aleksamagicka is the upstream maintainer —
      coordinate via Tested-by for the 240 variant + Ryujin III patch series.
    capability: "rw_full"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes:
      "1": "manual"
      "2": "device_auto"
    off_behaviour: "stops"
    polling_latency_ms_hint: 100
    recommended_alternative_driver: null
    conflicts_with_userspace:
      - daemon: "liquidctl"
        detection: "pgrep -x liquidctld"
        resolution: "coexist_warning"
        reason: "liquidctl supports Ryujin via separate code path; mainline driver and liquidctl on the same HID device will flap PWM. Prefer mainline."
    fan_control_capable: true
    fan_control_via: null
    kernel_version:
      min: "6.9"
    required_modprobe_args: []
    pwm_polarity_reservation: "static_normal"
    exit_behaviour: "restore_auto"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: false
    citations:
      - "https://github.com/aleksamagicka/asus_rog_ryujin-hwmon (canonical out-of-tree dev tree)"
      - "https://docs.kernel.org/hwmon/asus_rog_ryujin.html (mainline docs)"
