schema_version: "1.2"

driver_profiles:
  - module: "lm85"
    family: "nsc-fanctrl"
    description: "National Semiconductor LM85 fan controller — older workstation/server boards. RW with auto-temp modes."
    capability: "rw_full"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes:
      "1": "manual"
      "2": "bios_auto"
    off_behaviour: "stops"
    polling_latency_ms_hint: 50
    recommended_alternative_driver: null
    conflicts_with_userspace: []
    fan_control_capable: true
    fan_control_via: null
    required_modprobe_args: []
    pwm_polarity_reservation: "static_normal"
    exit_behaviour: "force_max"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: false
    citations:
      - "https://docs.kernel.org/hwmon/lm85.html"
