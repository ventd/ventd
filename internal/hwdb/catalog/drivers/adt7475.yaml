schema_version: "1.0"

driver_profiles:
  - module: "adt7475"
    family: "analog-devices-fanctrl"
    description: "Analog Devices ADT7473/7475/7476/7490 fan controller — workstation boards (Supermicro, Dell PowerEdge), high-end consumer (ASUS WS series). RW with temp-mapped auto mode."
    capability: "rw_full"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes:
      "0": "full_speed"
      "1": "manual"
      "2": "bios_auto"
    off_behaviour: "stops"
    polling_latency_ms_hint: 50
    recommended_alternative_driver: null
    conflicts_with_userspace: []
    fan_control_capable: true
    fan_control_via: null
    required_modprobe_args: []
    pwm_polarity_reservation: "static_normal"
    exit_behaviour: "force_max"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: false
    citations:
      - "https://docs.kernel.org/hwmon/adt7475.html"
