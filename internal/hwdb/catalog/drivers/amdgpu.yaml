schema_version: "1.0"

driver_profiles:
  - module: "amdgpu"
    family: "amd-gpu"
    description: "AMD GPU fan control via amdgpu hwmon — pwm1 writable when pwm1_enable=1. Standard duty_0_255 unit. Some boards boot with pwm=0 in stuck auto mode; manual/auto dance needed."
    capability: "rw_quirk"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes:
      "1": "manual"
      "2": "bios_auto"
    off_behaviour: "falls_to_min"
    polling_latency_ms_hint: 50
    recommended_alternative_driver: null
    conflicts_with_userspace: []
    fan_control_capable: true
    fan_control_via: null
    required_modprobe_args: []
    pwm_polarity_reservation: "static_normal"
    exit_behaviour: "restore_auto"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: false
    citations:
      - "https://docs.kernel.org/gpu/amdgpu/thermal.html"
