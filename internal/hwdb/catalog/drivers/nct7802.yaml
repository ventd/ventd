schema_version: "1.0"

driver_profiles:
  - module: "nct7802"
    family: "nuvoton-add-in"
    description: "Nuvoton NCT7802 add-in fan controller — BMC-adjacent server fan management, some workstation boards."
    capability: "rw_full"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes:
      "1": "manual"
      "2": "thermal_cruise"
    off_behaviour: "stops"
    polling_latency_ms_hint: 50
    recommended_alternative_driver: null
    conflicts_with_userspace: []
    fan_control_capable: true
    fan_control_via: null
    required_modprobe_args: []
    pwm_polarity_reservation: "static_normal"
    exit_behaviour: "force_max"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: false
    citations:
      - "https://docs.kernel.org/hwmon/nct7802.html"
