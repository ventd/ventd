schema_version: "1.2"

# NZXT Kraken X42/X52/X62/X72 — mainline nzxt-kraken2. USB-HID AIO.
# hwmon name "kraken2". Monitoring only in mainline: liquid temp +
# pump/fan RPM; no PWM write path (RGB and speed control are not exposed
# by the kernel driver — liquidctl handles those). Section C3.

driver_profiles:
  - module: "nzxt-kraken2"
    family: "nzxt"
    description: "NZXT Kraken X42/X52/X62/X72 AIO (mainline nzxt-kraken2). hwmon name 'kraken2': liquid temperature + pump/fan RPM monitoring only. No kernel PWM control path; pump/fan duty and RGB are set via liquidctl in userspace."
    capability: "ro_sensor_only"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes: {}
    off_behaviour: "bios_dependent"
    polling_latency_ms_hint: 500
    recommended_alternative_driver: null
    conflicts_with_userspace: []
    fan_control_capable: false
    fan_control_via: "liquidctl"
    required_modprobe_args: []
    pwm_polarity_reservation: "not_applicable"
    exit_behaviour: "preserve"
    runtime_conflict_detection_supported: false
    firmware_curve_offload_override: false
    citations:
      - "https://docs.kernel.org/hwmon/nzxt-kraken2.html"
      - "https://github.com/torvalds/linux/blob/master/drivers/hwmon/nzxt-kraken2.c (hwmon name 'kraken2', monitoring only)"
