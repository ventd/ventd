schema_version: "1.2"

# Razer PWM PC Fan Controller (USB-HID 1532:0F3C) — OOT SlimRG, GPL, DKMS.
# Registers hwmon name "razer_pwm_pc_fan" with 8x fan_input RPM + 8x
# writable pwm (HWMON_PWM_INPUT | HWMON_PWM_ENABLE). USB device, self-
# detecting via HID_USB_DEVICE — ventd binds on the chip; no board
# entries. Section A9 / C of the 2026-05-17 sweep.

driver_profiles:
  - module: "razer_pwm_pc_fan_controller"
    family: "razer"
    description: "Razer PWM PC Fan Controller (USB-HID 1532:0F3C) — OOT SlimRG/razer-pwm-pc-fan-hwmon (GPL, DKMS). hwmon name 'razer_pwm_pc_fan': 8x fan_input RPM + 8x writable pwm (HWMON_PWM_ENABLE). A standalone USB fan hub, distinct from the Razer Blade laptops covered in razer.yaml."
    capability: "rw_full"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes:
      "1": "manual"
    off_behaviour: "stops"
    polling_latency_ms_hint: 200
    recommended_alternative_driver: null
    conflicts_with_userspace: []
    fan_control_capable: true
    fan_control_via: null
    required_modprobe_args: []
    pwm_polarity_reservation: "not_applicable"
    exit_behaviour: "preserve"
    runtime_conflict_detection_supported: false
    firmware_curve_offload_override: false
    citations:
      - "https://github.com/SlimRG/razer-pwm-pc-fan-hwmon (razer_pwm_pc_fan_controller.c — hwmon name 'razer_pwm_pc_fan', HID_USB_DEVICE 0x1532:0x0F3C, 8x fan + 8x pwm HWMON_PWM_ENABLE; GPL)"
