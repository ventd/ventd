schema_version: "1.2"

driver_profiles:
  - module: "hp-wmi-sensors"
    family: "hp-wmi"
    description: "HP WMI sensors — HP EliteBook/ZBook/ProBook/ProDesk business class. READ-ONLY: exposes fan_input, fan_fault, fan_alarm but no pwm attributes. Fan is BIOS-controlled."
    capability: "ro_design"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes: {}
    off_behaviour: "bios_dependent"
    polling_latency_ms_hint: 200
    recommended_alternative_driver:
      module: "nbfc-linux"
      source: "github.com/nbfc-linux/nbfc-linux"
      install_method: "distro_package"
      package_hint: "nbfc-linux"
      reason: "No kernel fan control path for HP consumer/business machines. NBFC-Linux provides EC-direct fan control with per-model configs."
      applies_to_boards:
        - "hp"
        - "hewlett-packard"
      module_args_hint: []
    conflicts_with_userspace: []
    fan_control_capable: false
    fan_control_via: "nbfc-linux"
    required_modprobe_args: []
    pwm_polarity_reservation: "not_applicable"
    exit_behaviour: "bios_dependent"
    runtime_conflict_detection_supported: false
    firmware_curve_offload_override: false
    citations:
      - "https://docs.kernel.org/hwmon/hp-wmi-sensors.html"
