schema_version: "1.0"

driver_profiles:
  - module: "xe"
    family: "intel-gpu"
    description: "Intel Arc Battlemage (BMG, B580/B570) GPU via xe driver. fan*_input is read-only as of kernel 6.12+. No userspace write path — fan control is firmware-managed on-chip. fan_control_capable=false; ventd surfaces fan RPM for monitoring only."
    capability: "ro_sensor_only"
    pwm_unit: "duty_0_255"
    pwm_unit_max: null
    pwm_enable_modes: {}
    off_behaviour: "state_off"
    polling_latency_ms_hint: 50
    recommended_alternative_driver: null
    conflicts_with_userspace: []
    fan_control_capable: false
    fan_control_via: null
    required_modprobe_args: []
    pwm_polarity_reservation: "not_applicable"
    exit_behaviour: "bios_dependent"
    runtime_conflict_detection_supported: false
    firmware_curve_offload_override: true
    citations:
      - "https://docs.kernel.org/ABI/testing/sysfs-driver-intel-xe-hwmon"
