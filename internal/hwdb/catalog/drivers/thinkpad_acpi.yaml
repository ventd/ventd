schema_version: "1.2"

driver_profiles:
  - module: "thinkpad_acpi"
    family: "thinkpad-proc"
    description: "ThinkPad ACPI fan control via /proc/acpi/ibm/fan — levels 0-7 plus named states. Requires experimental=1 on T440+. Does NOT use hwmon pwm interface."
    capability: "rw_proc"
    pwm_unit: "thinkpad_level"
    pwm_unit_max: 7
    pwm_enable_modes:
      "1": "manual"
      "2": "bios_auto"
    off_behaviour: "stops"
    polling_latency_ms_hint: 100
    recommended_alternative_driver: null
    conflicts_with_userspace: []
    fan_control_capable: true
    fan_control_via: null
    required_modprobe_args:
      - arg: "fan_control=1"
        reason: "Required to enable pwm1_enable / pwm1 write surface — kernel default disables thinkpad_acpi fan writes; the experimental= alias has no effect on the fan-write gate per drivers/platform/x86/thinkpad_acpi.c."
        risk: "low"
    pwm_polarity_reservation: "not_applicable"
    exit_behaviour: "restore_auto"
    runtime_conflict_detection_supported: true
    firmware_curve_offload_override: false
    citations:
      - "https://www.thinkwiki.org/wiki/How_to_control_fan_speed"
