      sysfs_hint: "name=alienware_wmi via mainline alienware-wmi-wmax — manual pwm + fanN_boost (0-255) + platform_profile + G-Mode"
    additional_controllers:
      - chip: "coretemp"
        sysfs_hint: "name=coretemp mainline — Intel Core Ultra (Arrow Lake-HX) CPU temp"
      - chip: "nvme"
        sysfs_hint: "name=nvme — NVMe SSD telemetry"
    overrides: {}
    required_modprobe_args: []
    conflicts_with_userspace:
      - "AWCC (Windows)"
    notes: |
      Alienware 16 Area-51 (2025 flagship). g_series quirk: hwmon manual
      fan control + platform_profile + G-Mode (special profile 0xAB,
      optionally forced via the driver's force_gmode modparam).
