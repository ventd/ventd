schema_version: "1.3"
# Alienware + Dell G-series gaming catalog — wave 10 (2026-05-17 sweep, A3).
#
# FIRST WRITABLE LAPTOP-FLEET ENTRY (not monitor-only). All boards below
# are driven by the mainline `alienware-wmi-wmax` driver (Kurt Borja),
# which registers a hwmon device named "alienware_wmi" exposing:
#   - temp_input, fan_input (RPM), fan_min/fan_max
#   - pwm with manual fan control + pwm_auto_channels_temp
#   - per-fan fanN_boost sysfs (0-255 clamp)
#   - platform_profile, and on G-series a G-Mode special profile (0xAB)
# Thermal tables: LEGACY (0x9) and USTT (0xA). See
# catalog/drivers/alienware-wmi-wmax.yaml + chip "alienware_wmi" in
# catalog/chips/laptop_chips.yaml.
#
# AUTHORITATIVE SOURCE: the DMI quirk table in mainline
# drivers/platform/x86/dell/alienware-wmi-wmax.c. Two quirk classes:
#   g_series_quirks  = hwmon + platform_profile + G-Mode
#   generic_quirks   = hwmon + platform_profile (no G-Mode)
#
# GLOB / SUBSTRING NOTE: the kernel DMI_MATCH does a substring match, so a
# table entry "Alienware m15" also covers "Alienware m15 R7" etc. ventd
# uses prefix globs ("Alienware m15*") to replicate that. The Intel
# "Alienware m16 R1" entry is listed AFTER "Alienware m16 R1 AMD" so the
# AMD (generic) glob wins for AMD units before the broader R1 glob.
#
# verified:false — sourced from the mainline kernel DMI table, not from
# ventd hardware. Requires kernel 6.14+ for the alienware-wmi-wmax split;
# manual hwmon fan control is part of Kurt Borja's hwmon series.

