schema_version: "1.2"
# ASUS ROG / TUF / Zephyrus / Flow / Ally laptop catalog.
# SKU codes ingested 2026-05-18 from asusctl/rog-aura/data/aura_support.ron — the
# canonical ASUS-Linux project's ROG model registry. asusctl is MPL-2; ASUS board
# SKU strings are factual identifiers (thin-data doctrine), not copyrightable
# expression. Per [[catalog-ingest-2026-05-17]] wave 2.
#
# All entries verified: false. fan-write is owned by asus-wmi platform driver +
# asusctl userspace; ventd reads tach/temps via asus-ec-sensors hwmon path.
# ro_sensor_only: true gates ventd's HAL away from writes on these SKUs.
# ROG Ally / Ally X (RC71L, RC72L) — fan-control belongs to hhd-dev/hhd
# (canonical handheld daemon).
#
# Entries are sorted longer-SKU-first to prevent short generic prefixes from
# shadowing more-specific glob matches at the matcher's first-hit return.

