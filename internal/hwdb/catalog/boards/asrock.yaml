      board_vendor: "ASRock"
      board_name: "X670E Taichi"
      board_version: ""
    primary_controller:
      chip: "nct6796"
      sysfs_hint: "name=nct6796 via nct6775 mainline (NCT6796D-S, primary fan controller)"
    additional_controllers:
      - chip: "nct6686"
        sysfs_hint: "name=nct6683 via nct6683 mainline (kernel 6.7+ for X670E Taichi support)"
    overrides: {}
    required_modprobe_args: []
    conflicts_with_userspace: []
    notes: "ASRock X670E Taichi. Dual Nuvoton: NCT6796D-S (primary, fans + most
      sensors, supported by nct6775 since baseline) + NCT6686D (secondary, more
      sensors via nct6683 in kernel 6.7+). Some users report fans show 0 RPM
      via nct6683 — primary fan readings come from nct6796 path. ventd should
      prefer nct6775 channel for fan control, use nct6683 only for additional
      temperature sensors."
    citations:
