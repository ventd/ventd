schema_version: "1.3"
# Microsoft Surface board catalog — surface_fan + SSAM/SAM thermal stack.
#
# Source: linux-surface/linux-surface project, drivers/platform/surface/
# in mainline kernel, drivers/hwmon/surface_fan.c.
#
# DRIVER OVERVIEW:
#   - `surface_fan` (mainline kernel 6.9+): hwmon driver exposing
#     fan1_input (RPM, 0444 read-only). NO write path — firmware owns fan
#     speed control. Bound via SSAM device tree on SSAM-capable models.
#   - `surface_platform_profile`: ACPI/SSAM-backed platform_profile driver
#     exposing 4 fan profile modes via /sys/firmware/acpi/platform_profile:
#       low_power / balanced / balanced-performance / performance
#     SSAM call: TC=0x05 (SSAM_SSH_TC_FAN), CID=0x0e, payload u8 profile.
#   - `surface_aggregator_module` (SAM): kernel module providing the SSAM
#     bus that surface_fan and surface_platform_profile sit on. Requires
#     ssh_packet_layer and ssh_request_layer transports.
#
# CAPABILITY MATRIX (this catalog covers fan-monitoring + profile-switch):
#   surface_fan (RPM read-only): ro_sensor_only: true
#   surface_platform_profile (4 modes): fan_mode_only: true, mode_count: 4
#   Models with both → primary_controller chip "surface_fan",
#                      overrides ro_sensor_only:true (fan write is firmware-owned)
#   Older models without surface_fan: chip "unknown", overrides unsupported:true
#
# sys_vendor: "Microsoft Corporation" (universal across Surface line).
#
# Source citations:
#   drivers/hwmon/surface_fan.c (Ivor Wanders, commit d612bf8 2024-02-25)
#   drivers/platform/surface/surface_platform_profile.c
#   drivers/platform/surface/surface_aggregator_registry.c (ssam_node_group_*)
#   github.com/linux-surface/linux-surface (contrib/thermald/ for older models)

board_profiles:

  # ── Surface Laptop family (5/6/7 + Studio 2 — full SSAM fan node) ─────────

  - id: "microsoft-surface-laptop-5"
    dmi_fingerprint:
      sys_vendor: "Microsoft Corporation"
      product_name: "Surface Laptop 5"
      board_vendor: "*"
      board_name: "*"
      board_version: "*"
    primary_controller:
      chip: "surface_fan"
      sysfs_hint: "name=surface_fan via mainline kernel 6.9+ surface_fan.c (RPM read-only)"
    additional_controllers: []
    overrides:
      ro_sensor_only: true
      fan_mode_only: true
      mode_count: 4
    required_modprobe_args: []
    conflicts_with_userspace: []
    notes: |
      Microsoft Surface Laptop 5 (ACPI MSHW0350, 2022 — 12th-gen Alder Lake U).
      SSAM node group `ssam_node_group_sl5` registers ssam_node_fan_speed
      (TC=0x05 CID=0x01) → surface_fan exposes fan1_input.

      Fan SPEED is read-only (firmware-controlled). Fan PROFILE switching is
      available via surface_platform_profile (4 modes: low_power, balanced,
      balanced-performance, performance — SSAM TC=0x05 CID=0x0e).

      ventd should register fan_mode_only mode with mode_count=4 and bind
      writes to /sys/firmware/acpi/platform_profile, not the fan PWM
      (which doesn't exist).
    citations:
      - "https://github.com/torvalds/linux/blob/master/drivers/hwmon/surface_fan.c"
      - "https://github.com/torvalds/linux/blob/master/drivers/platform/surface/surface_aggregator_registry.c (ssam_node_group_sl5)"
    contributed_by: "anonymous"
    captured_at: "2026-05-17"
    verified: false
    defaults:
      curves: []

