    notes: "MacBook Pro 15\" 2018 (Touch Bar, i7-8750H / i9-8950HK).
      Dual-fan chassis. applesmc surfaces both as RPM-target hwmon.
      ventd's hwmon backend can drive these via the fan*_target write
      path when an apple-mac board profile is wired with explicit
      RPM-target channel declarations. Marked ro_sensor_only as the
      conservative default — operators can opt in explicitly."
    citations:
