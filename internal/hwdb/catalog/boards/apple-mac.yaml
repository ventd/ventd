# SPDX-License-Identifier: GPL-3.0-or-later
# Apple Mac board catalog — Intel-era only.
#
# Apple Silicon (M1/M2/M3/M4) Macs have NO SMC equivalent; macOS
# manages fans entirely through DCP firmware paths that no Linux
# distribution exposes. Asahi Linux has its own pwmsys / asahi
# HAL backend (internal/hal/asahi) which covers tach reads — see
# that backend for M-series support.
#
# Intel Macs use the mainline `applesmc` kernel module. The hwmon
# surface exposes per-fan `fan*_input` (tach RPM), `fan*_min`,
# `fan*_target`, `fan*_manual`. fan_target is the RPM setpoint
# (NOT a 0-255 PWM byte); the hwmon backend's RPM-target write
# path drives this correctly when fans are declared via
# fan*_target rather than pwm*.
#
# All entries marked verified: false. The mbpfan project
# (https://github.com/linux-on-mac/mbpfan) is the canonical
# userspace reference for per-model fan curves.

