schema_version: "1.2"
# Dell board catalog — spec-03 PR 3 scope-B seed entries.
# All entries verified: false. Curves intentionally empty.
# DMI strings sourced from primary references (linux-hardware.org probes,
# Linux kernel patches, Dell user reports).
# Driver: dell-smm-hwmon (mainline, x86 SMM BIOS interface).
#
# IMPORTANT: dell-smm-hwmon uses TWO-TIER matching:
#   1. Generic prefix probe (i8k_dmi_table) — allows reads/temps for ALL
#      Dell systems matching "Latitude", "Inspiron", "Vostro", "XPS",
#      "Precision", etc.
#   2. Per-model fan control whitelist (i8k_whitelist_fan_control) —
#      ONLY entries on this list get pwm1_enable for write fan control.
#
# Boards NOT on the fan-control whitelist still load the driver and expose
# fan1_input + temp*_input as RO. ventd should register these as
# ro_sensor_only channels per spec-03 amendment.
#
# fan-control whitelist as of kernel 6.13 (verified from kernel sources):
#   - Dell Studio
#   - Dell Latitude D520, E6440
#   - Dell Inspiron 3505
#   - Dell XPS M140, XPS 13 9370, XPS 15 9560/9570
#   - Dell G3 3590, G5 5587, G5 5590, G5 5505
#   - Dell G15 5510/5511/5515
#   - Dell Optiplex 7000
#   - Dell Precision 7510
#
# See docs/research/2026-04-board-catalog-citations.md for source-per-field.

board_profiles:

  - id: "dell-latitude-7280"
    dmi_fingerprint:
      sys_vendor: "Dell Inc."
      product_name: "Latitude 7280"
      board_vendor: "Dell Inc."
      board_name: "*"
      board_version: "*"
    primary_controller:
      chip: "dell_smm"
      sysfs_hint: "name=dell_smm via dell-smm-hwmon ventd fork v7.0.0-ventd.3"
    additional_controllers: []
    overrides:
      direct_ec_pwm_unavailable: true
    required_modprobe_args: []
    conflicts_with_userspace:
      - "i8kutils"
    notes: "Phoenix box matrix #5 — i7-6600U Skylake business laptop.
      Matches generic 'Dell Latitude' prefix in i8k_dmi_table. With the
      ventd fork v7.0.0-ventd.3 driver the 7280 is on
      i8k_whitelist_fan_control (0x34a3/0x35a3) → pwm1_enable writable
      AND readable, all three SMM states (OFF/LOW/HIGH) usable, fan
      tach reads via SMM GET_SPEED. Without the ventd fork (in-tree
      driver only): falls back to ro_sensor_only behaviour — see
      preflight modinfo check that warns on stale driver versions.

      direct_ec_pwm_unavailable: empirical investigation on 2026-05-20
      confirmed the EC fan PWM/tach registers are SMM-private — not
      visible via the standard ACPI EC channel that NBFC would use. Do
      NOT offer NBFC config installation on this hardware. The realistic
      ceiling is the 3 SMM states × 4 platform-profile modes ≈ 12
      thermal envelopes."
    citations:
      - "https://github.com/torvalds/linux/blob/master/drivers/hwmon/dell-smm-hwmon.c (i8k_dmi_table — 'Dell Latitude' prefix entry)"
      - "https://docs.kernel.org/hwmon/dell-smm-hwmon.html (driver doc, two-tier match model)"
      - "https://github.com/ventd/dell-smm-hwmon-dkms/releases/tag/v7.0.0-ventd.3 (ventd fork adding Latitude 7280 to i8k_whitelist_fan_control)"
    contributed_by: "anonymous"
    captured_at: "2026-04-26"
    verified: false
    defaults:
      curves: []

