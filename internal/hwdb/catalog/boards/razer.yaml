schema_version: "1.2"
# Razer Blade laptop catalog — wave 5 of the 2026-05-17 ecosystem sweep.
# Per-device entries ingested from encomjp/razer-control-revived's
# razer_control_gui/data/devices/laptops.json (48 SKUs spanning Blade
# Stealth 2015 through Blade 18 2025).
#
# Razer Blade fan-control is owned by a custom USB HID protocol on the
# Razer device interface (USB VID 1532), NOT the EC port-0x68 family
# or mainline hwmon. All entries chip="unsupported" — ventd defers
# fan-write to encomjp/razer-control-revived (the actively-maintained
# fork, the upstream Razer-Linux/razer-laptop-control is archived).
#
# DMI product_name match is best-effort: Razer's BIOS embeds the
# marketing name + year (e.g. "Blade 15 Advanced Model (Mid 2020) -
# RZ09-0330x"). The glob "*Blade 15 2020 Advanced*" will match only
# when the live string contains the canonical marketing-name token
# order; future contributors should refine specific entries when
# dmidecode dumps land.

board_profiles:

  - id: "razer-blade-stealth-2015"
    dmi_fingerprint:
      sys_vendor: "Razer"
      product_name: "*Blade Stealth 2015*"
      board_vendor: "Razer"
      board_name: "*"
      board_version: "*"
    primary_controller:
      chip: "unsupported"
      sysfs_hint: "no mainline hwmon — USB HID protocol via 1532:0205"
    additional_controllers: []
    overrides:
      unsupported: true
    required_modprobe_args: []
    conflicts_with_userspace:
      - "razer-control-revived"
      - "openrazer"
      - "razer-cli"
    notes: "Razer Blade Stealth 2015 (USB VID:PID 1532:0205). Razer Blade fan-control is owned by a custom USB HID protocol on the Razer device interface, NOT the EC port-0x68 family or mainline hwmon. logo LED. Fan operating range per razer-control-revived: 3500-5000 RPM. ventd cannot drive this path natively; defer to encomjp/razer-control-revived (canonical maintained fork) or openrazer + razer-cli. Recorded as unsupported so doctor card surfaces the userspace remediation."
    citations:
      - "https://github.com/encomjp/razer-control-revived (canonical maintained Razer Blade fan/LED controller)"
      - "https://github.com/encomjp/razer-control-revived/blob/main/razer_control_gui/data/devices/laptops.json (USB VID:PID + fan range registry)"
      - "https://github.com/openrazer/openrazer (peripherals + battery-health framework; complementary to razer-control)"
    contributed_by: "anonymous"
    captured_at: "2026-05-18"
    verified: false
