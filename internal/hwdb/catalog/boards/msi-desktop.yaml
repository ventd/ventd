# MSI desktop motherboard catalog — NCT6687D Super I/O.
#
# Source: github.com/Fred78290/nct6687d — nct6687d_msi_alt_boards[] table.
# All 34 boards below are in the auto-detection table and receive the
# msi_alt1 fan register layout automatically — no fan_config=msi_alt1
# modparam required. Boards not listed here but using an NCT6687D chip
# fall under the generic "Micro-Star International" prefix entries in
# profiles.yaml (MAG/MPG prefix entries → default register layout).
#
# msi_fan_brute_force=1 is an optional BETA modparam that enables full
# system-fan PWM writes for these boards. It is NOT auto-enabled.
# All entries: requires_dkms: true (nct6687 is OOT from Fred78290).
#
# IMPORTANT: blacklist in-tree nct6683 before loading nct6687d:
#   echo "blacklist nct6683" > /etc/modprobe.d/nct6683-blacklist.conf
#
# board_name DMI field format on MSI boards:
#   "<MARKETING NAME> (<MS-CODE>)" e.g. "MAG Z890 TOMAHAWK WIFI (MS-7E32)"
# product_name DMI field: just the MS code, e.g. "MS-7E32"
#
# Boards sharing an MS code (same PCB, different marketing tier) require
# board_name glob to disambiguate.

