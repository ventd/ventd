# SPDX-License-Identifier: GPL-3.0-or-later
# Clevo / System76 / Tongfang board catalog.
#
# Clevo motherboards drive fans via the EC's port-0x68/0x6C
# interface. Mainline Linux has no driver for this path; the
# canonical userspace controller is `clevo-indicator`
# (https://github.com/SkyLandTW/clevo-indicator) or the CLI fork
# `clevo-fancontrol` (https://github.com/mmt050/clevo-fancontrol).
# Both speak the same ACPI 4.0 §12.3 OBF/IBF handshake that
# ventd's `internal/ec/dev_port` transport implements.
#
# System76 ships partly-Clevo (Bonobo / Oryx) and partly-custom
# (Lemur / Galago) hardware. system76-acpi-dkms provides hotkey
# + power-profile sysfs; fans on the Clevo-based models use the
# same port-0x68 path.
#
# Tongfang ODM produces the chassis behind the SCHENKER / XMG /
# Eluktronics / Origin PC brands. Same EC family.
#
# All entries marked verified: false. The board catalog is the
# matcher entry point; the runtime backend (T2.4 future PR) wires
# the EC dispatch.

