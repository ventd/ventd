  - id: "supermicro-x11sca-f"
    dmi_fingerprint:
      sys_vendor: "Supermicro"
      product_name: "Super Server"
      board_vendor: "Supermicro"
      board_name: "X11SCA-F"
      board_version: "*"
    primary_controller:
      chip: "ipmi_bmc"
      sysfs_hint: "/dev/ipmi0 via ipmi_si.ko + ipmi_devintf.ko (PRIMARY)"
    additional_controllers:
      - chip: "nct6776"
        sysfs_hint: "name=nct6776 via nct6775 (READ-only — AST2500 BMC overrides writes)"
    overrides:
      bmc_overrides_hwmon: true
      prefer_ipmi_backend: true
      bmc_panic_mode_risk: true
      vendor_raw_command_set: "supermicro_x11_x12"
    required_modprobe_args: []
    conflicts_with_userspace:
      - "smfc"
      - "ipmitool (when running as a fan-curve daemon)"
      - "freeipmi"
    notes: "Supermicro X11SCA-F (AST2500). Single LGA1151, Xeon E-2100/2200, IPMI. Same architectural pattern as
      X11SCH-F: BMC firmware actively manages fans; hwmon PWM writes succeed
      transiently then revert within seconds. ventd defers to IPMI backend
      (spec-01). For pre-spec-01 ventd: read-only telemetry via nct6776 is
      usable, fan-control attempts will appear to succeed then revert.
      BMC panic-mode risk: if all temps look critical to the BMC firmware,
      it will lock fans to 100%. Use Supermicro's IPMI 'Full Mode' to
      release fan control to OS, then re-arm BMC watchdog before exit."
    citations:
      - "https://github.com/petersulyok/smfc (Supermicro X9-X13 IPMI fan controller, requires Full Mode)"
      - "https://www.supermicro.com/manuals/ (board manual hub)"
    contributed_by: "anonymous"
    captured_at: "2026-05-18"
    verified: false
    defaults:
      curves: []

