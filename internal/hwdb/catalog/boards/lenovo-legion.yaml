      chip-ID mismatch dmesg line as informational, not an error
      condition.

      LPCN has its own config table entry in legion_laptop — driver
      loads "Using configuration for system: LPCN" (NOT forced GKCN
      fallback). First-class support.

      Shared fingerprint family with Legion Pro 5 16ARX8 — same LPCN
      BIOS, different product_name (82WT for Pro 5 — separate entry
