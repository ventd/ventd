      board_vendor: "LENOVO"
      board_name: "*"
      board_version: "LOQ 15IRH8"
      bios_version: "LZCN*"
    primary_controller:
      chip: "legion_hwmon"
      sysfs_hint: "name=legion_hwmon via legion_laptop OOT DKMS (RoyChong5053/LenovoLegionLinux-LOQ fork)"
    additional_controllers:
