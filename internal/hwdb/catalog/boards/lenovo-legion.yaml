      legion_laptop DMI allowlist. Driver loads under GKCN fallback
      config. Issue #163 tracks user request to add 83DF to allowlist.

      Note: roadmap doc previously inferred "NMCN*" for this board —
      that was incorrect. Lenovo BIOS naming for 14th gen Intel
      Raptor Lake HX-Refresh uses N0CN (note the zero), not NMCN.
      Verified across Issue #163 dmidecode + Lenovo support pages
      + Lenovo BIOS update file naming.

      Common Intel-CPU-bug exposure: 14900HX is in the Raptor Lake
      voltage-instability cohort — users may encounter EC log entries
      related to thermal throttling / VID limit faults. Not a ventd
      concern but worth flagging in logs.
