      REQUIRES force=1 modparam: M3CN is NOT in the legion_laptop
      DMI allowlist as of 2026-04. Driver loads with `legion PNP0C09:00:
      legion_laptop is forced to load... Using configuration for system:
      GKCN`. Fan curve format and EC layout are GKCN-derived; M3CN may
      have minor schema drift but core read/write paths work.

      ventd packaging implication: when M3CN board is detected, ventd
      installer should add `options legion_laptop force=1` to
      /etc/modprobe.d/legion_laptop.conf. spec-06 install contract
      should grow a per-board modprobe-options sidecar.
