  # ── LOQ family (2026-05-17 ingest from RoyChong5053/LenovoLegionLinux-LOQ) ──
  #
  # LOQ is Lenovo's mid-tier gaming brand (positioned below Legion).
  # The RoyChong5053 fork extends johnfanv2/LenovoLegionLinux with LOQ-specific
  # configs. All LOQ models share:
  #   - EC chip ID 0x8227 (except 15AHP10 which is 0x5508 — unsupported)
  #   - ec_register_offsets_loq_v0 layout
  #   - ACCESS_METHOD_EC3 fan curve access (distinct from standard Legion EC)
  #   - No GKCN fallback — each LOQ generation has a dedicated config struct
  #
  # Allowlisted in fork (no force=1): LZCN, NECN, NZCN
  # NOT allowlisted as of fork state 2026-05: R3CN (15IRX10), PQCN (15ARP9),
  # LYCN (15APH8). R8CN (15AHP10) has new EC 0x5508 and is fully unsupported.

