      fancurve_format: "10-point-loq-v0"
    required_modprobe_args: []
    conflicts_with_userspace:
      - "lenovo-legion-tools"
      - "PlasmaVantage"
    notes: |
      Lenovo LOQ 15IRH8 (2023 Intel). i5-12450HX / i5-13420H + RTX 4050/4060.
      15.6" 144Hz panel. PRODUCT_NAME 82XV, BIOS_VERSION LZCN family
      (LZCN31WW, LZCN33WW, LZCN38WW observed). EC chip 0x8227.

      In RoyChong5053 fork allowlist (`model_lzcn`) — no force=1 needed.
