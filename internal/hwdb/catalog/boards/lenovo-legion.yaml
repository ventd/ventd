      The mainline johnfanv2/LenovoLegionLinux does NOT include LZCN —
      ventd users on stock Legion DKMS need to switch to the RoyChong5053
      fork or apply the LOQ patches. ventd packaging should detect
      product_name 82XV and recommend the LOQ fork.
