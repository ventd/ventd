schema_version: "1.2"
# Lenovo Legion gaming laptop catalog — spec-03 PR 3 scope-C entries.
# All entries verified: false. Curves intentionally empty.
#
# REQUIRES SCHEMA v1.1 (spec-03-amendment-schema-v1.1.md):
#   - bios_version field on dmi_fingerprint (§SCHEMA-BIOSVER)
#   Without v1.1, these entries cannot disambiguate Legion generations.
#
# CRITICAL CONTEXT FOR ALL LEGION ENTRIES:
#   Lenovo Legion laptops dispatch on DMI BIOS_VERSION 4-character
#   prefix, NOT product_name. Multiple Legion generations share product
#   names (e.g. "82B1" can be Gen 5 ARH05H AMD with FSCN BIOS).
#   Conversely, the same Legion generation can ship with several
#   product_name codes (Gen 6 GKCN appears as 82JU, 82JQ, 82N6, etc.).
#
#   The fingerprint key is bios_version "<PREFIX>*" with product_name
#   as a sanity check. legion_laptop kernel driver itself dispatches
#   the same way — see LenovoLegionLinux/kernel_module/legion-laptop.c
#   optimistic_allowlist DMI table.
#
#   Some BIOS_VERSION generations (M3CN, N0CN as of 2026-04) load
#   under "GKCN" config via force=1 fallback. Driver explicitly logs
#   "Using configuration for system: GKCN" — fan curve format may
#   match or may not, EC chip ID variance handled gracefully.
#
# DRIVER REFERENCE:
#   internal/hwdb/catalog/drivers/legion_hwmon.yaml — OOT DKMS,
#   johnfanv2/LenovoLegionLinux. dkms_required: true.
#
# ventd integration phase:
#   v0.5.0: registration only — telemetry mode, no fan write.
#   v0.6.0+: powermode + platform_profile single-value writes.
#   v0.7.0+: 10-point fancurve via debugfs (spec-05 P4-HWCURVE).
#
# See docs/research/2026-04-board-catalog-citations.md scope-C append
# for source-per-field.

