# Gigabyte board catalog — spec-03 PR 3 seed entries.
# All entries verified: false. Curves intentionally empty.
# Several Gigabyte boards exhibit the "BIOS-overridden" write pattern (PWM writes
# accepted but ignored by EC/BIOS) — flagged in notes per board.

board_profiles:

  - id: "gigabyte-x670e-aorus-master"
    dmi_fingerprint:
      sys_vendor: "Gigabyte Technology Co., Ltd."
      product_name: "X670E AORUS MASTER"
      board_vendor: "Gigabyte Technology Co., Ltd."
      board_name: "X670E AORUS MASTER"
      board_version: ""
    primary_controller:
      chip: "it8689"
      sysfs_hint: "name=it8689 via frankcrawford/it87 OOT driver (mmio=on for AMD ECIO H2RAM)"
    additional_controllers:
      - chip: "it8792"
        sysfs_hint: "name=it8792 secondary chip at 0xa60, also via frankcrawford/it87"
    overrides:
      bios_overridden_pwm_writes: true
    required_modprobe_args:
      - "ignore_resource_conflict=1"
      - "force_id=0x8689"
      - "mmio=on"
    conflicts_with_userspace: []
    notes: "Gigabyte X670E AORUS MASTER. Dual ITE chips: IT8689E (primary, fans)
      + IT8792E (secondary). frankcrawford/it87 OOT driver required (not mainline).
      KNOWN ISSUE: IT8689E revision 1 accepts PWM writes without error but they
      have NO EFFECT on actual fan speed. Issue tracked at
      frankcrawford/it87#96. Until upstream fix, ventd's calibration probe
      should detect this as bios_overridden=true and route to monitor-only.
      Revision 2 of IT8689E (e.g. on B650 Eagle AX) has BIOS workaround that
      makes writes work."
    citations:
      - "https://github.com/frankcrawford/it87/issues/96 (X670E AORUS MASTER, IT8689E rev 1, write-blocked)"
      - "https://github.com/frankcrawford/it87 (OOT driver source)"
      - "https://gist.github.com/bakman2/e801f342aaa7cade62d7bd54fd3eabd8 (Gigabyte Aorus Linux fan control walkthrough)"
    contributed_by: "anonymous"
    captured_at: "2026-04-26"
    verified: false
    defaults:
      curves: []

