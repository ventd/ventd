      product_name: "Laptop"
      board_vendor: "Framework"
      board_name: "FRANBMCP*"
      board_version: "*"
    primary_controller:
      chip: "unsupported"
      sysfs_hint: "cros_ec_fan hwmon (kernel 6.7+); older kernels need ectool"
    additional_controllers: []
    overrides:
      ro_sensor_only: true
    required_modprobe_args: []
    conflicts_with_userspace:
