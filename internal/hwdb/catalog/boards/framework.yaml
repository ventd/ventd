# SPDX-License-Identifier: GPL-3.0-or-later
# Framework Computer board catalog.
#
# Framework laptops use ChromeOS-derived EC firmware. The mainline
# `cros_ec_fan` driver (kernel 6.7+) exposes the Framework EC's
# fan as hwmon — when loaded, ventd's existing hwmon backend
# drives it directly. Older kernels need the userspace `ectool`
# from upstream or the out-of-tree `framework-laptop-kmod-impostor`
# project.
#
# fw-fanctrl (https://github.com/TamtamHero/fw-fanctrl) is the
# canonical Framework-tuned curve userspace tool. It additionally
# implements a charging-vs-discharging dual-strategy switch that
# ventd's controller doesn't have today (T2.1's followup adds this
# as an additive schema field).
#
# All entries marked verified: false. The DMI strings are pulled
# from the published Framework support matrix.

schema_version: "1.2"

board_profiles:

  - id: "framework-13-intel-11th-gen"
    dmi_fingerprint:
