schema_version: "1.2"
# Raspberry Pi board catalog — spec-03 PR 4 (schema v1.1 DT fingerprint).
# Pi 5 uses device-tree fingerprint; no DMI/SMBIOS present on ARM SBCs.
# Cooling path: kernel pwm-fan driver + thermal zone (cooling-device detach required).

board_profiles:

  - id: "raspberry-pi-5-model-b"
    dt_fingerprint:
      compatible: "raspberrypi,5-model-b"
      model: "Raspberry Pi 5 Model B*"
    primary_controller:
      chip: "pwmfan"
      sysfs_hint: "name=pwmfan; thermal cooling-device must be detached before manual PWM writes"
    additional_controllers: []
    overrides:
      arm_device_tree: true
      cooling_device_must_detach: true
    required_modprobe_args: []
    conflicts_with_userspace: []
    notes: "Raspberry Pi 5 Model B. Fan controlled via kernel pwm-fan driver and
      thermal-zone cooling device. Manual PWM writes require detaching the cooling
      device first (write 0 to /sys/class/thermal/cooling_deviceN/cur_state).
      Kernel 6.6+ required for stable pwm-fan sysfs on Pi 5."
    citations:
      - "https://github.com/raspberrypi/firmware/blob/master/boot/bcm2712-rpi-5-b.dtb"
      - "https://www.kernel.org/doc/html/latest/driver-api/thermal/sysfs-api.html"
    contributed_by: "anonymous"
    captured_at: "2026-04-26"
    verified: false
    defaults:
      curves: []
