      pcie_card_thermal_response_aggressive: true
    required_modprobe_args: []
    conflicts_with_userspace:
      - "ipmitool"
      - "freeipmi"
      - "OpenManage Server Administrator"
      - "iDRAC Service Module"
    notes: |
      Dell PowerEdge R740xd (14th gen, 2U, dual-socket Xeon Scalable
      Gen 1/Gen 2 + 24x or 32x SFF storage). The "xd" variant adds
      front-rear-NVMe storage capacity vs base R740. Single most
      popular homelab/TrueNAS target in this generation.

      KNOWN ISSUE: 14G servers default to AGGRESSIVE thermal response
      when non-Dell PCIe cards (NIC, HBA, GPU) are detected. Even
      with iDRAC firmware <= 3.30, the "Default fan response" mode
      ramps fans to 60-80% with third-party LSI/Broadcom HBAs that
      lack TempPage SMBus thermal sensors. Workaround: run
      `raw 0x30 0xce 0x00 0x16 0x05 0x00 0x00 0x00 0x05 0x00 0x01
      0x00 0x00` to disable the third-party-PCIe thermal-override
      response (works on 12G/13G, deprecated on 14G+).

      Same iDRAC firmware policy as R740/R640: 3.34+ blocks raw fan
      control entirely.
    citations:
      - "https://techmikeny.com/blogs/techtalk/how-to-lower-fan-speed-after-installing-third-party-card (R740xd third-party-PCIe thermal override + raw 0x30 0xce command + 14G blockage warning)"
      - "https://www.virtualbytes.io/dell-poweredge-ipmi-fan-control/ (general 14G workflow)"
    contributed_by: "anonymous"
    captured_at: "2026-04-26"
    verified: false
