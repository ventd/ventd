    required_modprobe_args: []
    conflicts_with_userspace: []
    notes: "HP Omen (older generation) — DMI board_name=8A15. Uses the timed thermal-profile EC layout — BIOS auto-reverts after a countdown timer (HP_OMEN_EC_THERMAL_PROFILE_TIMER_OFFSET=0x63) so any sysfs write must be re-asserted within 120s. mainline hp-wmi pre-6.20 does not expose PWM for this class. Remediation: alou-S/omen-fan userspace (services the timer) or wait for upstream PWM coverage."
