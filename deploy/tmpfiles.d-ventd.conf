# tmpfiles.d fragment for ventd.
# Creates /run/ventd at boot before either ventd.service or ventd-ipmi.service
# starts. Mode 0750: ventd-ipmi (owner) writes the socket; the ventd group
# (both accounts are members) can connect to it.
#
# Install to: /usr/lib/tmpfiles.d/ventd.conf
# Apply now:  systemd-tmpfiles --create /usr/lib/tmpfiles.d/ventd.conf
#
# Column order: type path mode user group age
d /run/ventd             0750 ventd-ipmi ventd -
d /var/lib/ventd         0755 ventd      ventd -
d /var/lib/ventd/models  0755 ventd      ventd -
d /var/lib/ventd/logs    0755 ventd      ventd -
