# sysusers.d fragment for ventd.
# Creates the ventd-ipmi system account used by ventd-ipmi.service.
#
# Install to: /usr/lib/sysusers.d/ventd.conf
# Apply now:  systemd-sysusers /usr/lib/sysusers.d/ventd.conf
#
# Column order: type name id description home shell
u ventd-ipmi - "ventd IPMI sidecar" - -
