# Registry of tests known to flake under timing/scheduling pressure on
# GitHub Actions runners. Tests listed here get one automatic retry from
# scripts/retry-flaky.sh if they fail in CI; second failure is real.
#
# Adding a test to this list is a deliberate ratchet — every entry must:
#   - cite the issue or run that prompted it
#   - state the failure mode (timing race, CI noise, scheduler jitter)
#   - have a real fix on the roadmap (don't normalise flakes forever)
#
# Format:
#   - test:   <pkg>:<TopLevelTest>[/<subtest>]
#     issue:  https://github.com/ventd/ventd/issues/<N>
#     reason: short one-liner
#     since:  YYYY-MM-DD when the entry was added
#
# Example: a single test in a package, all subtests covered by the parent name:
#   - test: ./internal/scheduler:TestScheduler_ManualOverrideStaysUntilTransition
#     issue: https://github.com/ventd/ventd/issues/623
#     reason: timer scheduling jitter on shared GHA runners
#     since: 2026-04-15
#
# The list is currently empty: every prior entry's root cause has been fixed,
# so no test needs a retry to be trustworthy. Each "removed once the fix lands"
# entry was retired when its fix landed (issue #623 / #883):
#   - the profile-schedule /sys-dependency tests now stub the hwmon root
#     (web stubHwmonRoot); the scheduler-override test uses the injected clock
#     (SetNowFn) — no real timers.
#   - the regression_466 controller-tick tests poll with a generous timeout
#     (controllerFirstTickWait) instead of a 2-3s deadline that under-sized the
#     async wait on -race / emulated-arm64 lanes.
#   - the diag/send upload tests inject a stub bundle via the new Server
#     diagGenerate seam instead of walking the live system with diag.Generate.
#   - TestCalibrate_CtxCancelStopsRunSync no longer exists.
# Keep this ratchet honest: re-add an entry (with its fix on the roadmap) only
# if a genuinely new flake appears, and retire it the moment the fix lands.

flaky: []
