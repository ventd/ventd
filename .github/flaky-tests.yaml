# Registry of tests known to flake under timing/scheduling pressure on
# GitHub Actions runners. Tests listed here get one automatic retry from
# scripts/retry-flaky.sh if they fail in CI; second failure is real.
#
# Adding a test to this list is a deliberate ratchet — every entry must:
#   - cite the issue or run that prompted it
#   - state the failure mode (timing race, CI noise, scheduler jitter)
#   - have a real fix on the roadmap (don't normalise flakes forever)
#
# Format:
#   - test:   <pkg>:<TopLevelTest>[/<subtest>]
#     issue:  https://github.com/ventd/ventd/issues/<N>
#     reason: short one-liner
#     since:  YYYY-MM-DD when the entry was added
#
# Example: a single test in a package, all subtests covered by the parent name:
#   - test: ./internal/scheduler:TestScheduler_ManualOverrideStaysUntilTransition
#     issue: https://github.com/ventd/ventd/issues/623
#     reason: timer scheduling jitter on shared GHA runners
#     since: 2026-04-15

flaky:
  - test: github.com/ventd/ventd/internal/web:TestScheduler_ManualOverrideStaysUntilTransition
    issue: https://github.com/ventd/ventd/issues/623
    reason: timer scheduling jitter on shared GitHub Actions runners
    since: 2026-04-15
    # Path corrected from ./internal/scheduler in PR #811 — the test
    # actually lives at internal/web/schedule_test.go:195. retry-flaky's
    # python parser keys on the full Go module path (the JSON stream's
    # Package field), so the registry entry must match exactly. With the
    # old `./internal/scheduler:` path, retries never fired and the
    # test has been failing CI without retry for weeks.
  - test: github.com/ventd/ventd/internal/web:TestHandleProfileSchedule_UpdatesAndPersists
    issue: https://github.com/ventd/ventd/issues/623
    reason: depends on /sys/class/hwmon being readable; cloud-VM
            ubuntu runners occasionally hit "open .: no such file or
            directory" from the package-level os.DirFS hwmonRootFS.
            Container lanes (Arch/Alpine/Fedora) inherit /sys from
            the host kernel and pass deterministically.
    since: 2026-05-02
  - test: github.com/ventd/ventd/internal/web:TestConfig_ProfileScheduleRoundTrip
    issue: https://github.com/ventd/ventd/issues/623
    reason: same /sys/class/hwmon dependency as
            TestHandleProfileSchedule_UpdatesAndPersists.
    since: 2026-05-02
  - test: github.com/ventd/ventd/cmd/ventd:TestRegression_Issue466_ReloadFailureIsNonFatal
    issue: https://github.com/ventd/ventd/issues/623
    reason: 2-second polling deadline for the controller-tick handshake
            fires too tight on arm64 GHA runners under -race; the
            QEMU-emulated arm64 lane occasionally takes longer than 2s
            to reach the first PWM=64 write. Roadmap fix is clock
            injection (Stage 1.5 PR-8), at which point this entry can
            be removed.
    since: 2026-05-03
