name: cowork-status
on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: cowork/state
          path: state
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: main
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: main/go.mod
      - name: render dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd main
          go run ./tools/coworkstatus \
            -events ../state/.cowork/events.jsonl \
            > "${RUNNER_TEMP}/status.md"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cowork-status
          path: ${{ runner.temp }}/status.md
