name: Drift Detect

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:        # manual trigger for smoke-testing

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v1.62.2

      - name: Install dupl
        run: go install github.com/mibk/dupl/cmd/dupl@latest

      - name: Run driftreport
        id: drift
        run: |
          go run ./tools/driftreport \
            --root . \
            --baseline .github/drift-baseline.json \
            --thresholds .github/drift-thresholds.yaml \
            --output /tmp/drift-report.json
          echo "drift_count=$(jq '.drifts | length' /tmp/drift-report.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: drift-report
          path: /tmp/drift-report.json
          retention-days: 90

      - name: Open drift issue
        if: steps.drift.outputs.drift_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/drift-report.json', 'utf8'));
            const lines = report.drifts.map(d => `- ${d}`).join('\n');
            const cur = report.current;
            const body = [
              '## Automated drift report — violations detected',
              '',
              '### Violations',
              lines,
              '',
              '### Current snapshot',
              '```',
              `dead_code_count : ${cur.dead_code_count}`,
              `dup_loc         : ${cur.dup_loc}`,
              `binary_size_kb  : ${cur.binary_size_kb}`,
              `dep_graph_lines : ${cur.dep_graph_lines}`,
              `hal_impl_count  : ${cur.hal_impl_count}`,
              '```',
              '',
              'Full JSON report is in the workflow artifacts.',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'drift:detected — weekly quality report flagged violations',
              body,
              labels: ['drift:detected'],
              assignees: ['PhoenixDnB'],
            });
