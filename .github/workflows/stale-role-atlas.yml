name: stale-role-atlas

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            const STALE_MS        = 72 * 60 * 60 * 1000;
            const ATLAS_LABEL     = 'role:atlas';
            const ESC_LABEL       = 'decide:phoenix';
            const DASH_LABEL      = 'triage-dashboard';
            const MARKER          = '<!-- stale-role-atlas-escalation -->';
            const ESC_BODY        =
              `${MARKER}\n` +
              `@PhoenixDnB — this role:atlas item has been idle for >72h. ` +
              `Recommending design decision or close. Atlas can't auto-advance without direction.`;

            // Ensure labels exist (idempotent)
            for (const [name, color, desc] of [
              [ESC_LABEL,  'e4e669', 'Needs a design decision from Phoenix'],
              [DASH_LABEL, '0075ca', 'Atlas triage dashboard'],
            ]) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description: desc });
                } else throw e;
              }
            }

            // Fetch all open role:atlas issues
            const atlasIssues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, labels: ATLAS_LABEL, state: 'open', per_page: 100 },
            );

            const now = Date.now();
            let staleCt = 0, escalatedCt = 0, skippedCt = 0;
            const staleLinks = [];

            for (const issue of atlasIssues) {
              const age = now - new Date(issue.updated_at).getTime();
              if (age <= STALE_MS) continue;
              staleCt++;

              const hasEscLabel = issue.labels.some(l => l.name === ESC_LABEL);

              // Only fetch comments when label is already present (anti-churn path)
              let lastIsEsc = false;
              if (hasEscLabel) {
                const comments = await github.paginate(
                  github.rest.issues.listComments,
                  { owner, repo, issue_number: issue.number, per_page: 100 },
                );
                const last = comments[comments.length - 1];
                lastIsEsc = last?.body?.includes(MARKER) ?? false;
              }

              if (hasEscLabel && lastIsEsc) {
                skippedCt++;
                staleLinks.push({
                  number: issue.number, title: issue.title,
                  url: issue.html_url, status: 'skip (already escalated)',
                });
                continue;
              }

              if (!hasEscLabel) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issue.number, labels: [ESC_LABEL],
                });
              }
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number, body: ESC_BODY,
              });

              escalatedCt++;
              staleLinks.push({
                number: issue.number, title: issue.title,
                url: issue.html_url, status: 'escalated',
              });
            }

            // Find or create triage dashboard issue
            const dashList = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, labels: DASH_LABEL, state: 'open', per_page: 10 },
            );

            let dashIssue = dashList[0];
            if (!dashIssue) {
              const created = await github.rest.issues.create({
                owner, repo,
                title: 'Atlas Triage Dashboard',
                body: [
                  'Automated daily summary of stale `role:atlas` issues requiring design decisions.',
                  '',
                  'Updated daily by the `stale-role-atlas` workflow.',
                  'Ping `@PhoenixDnB` on any item tagged `decide:phoenix`.',
                ].join('\n'),
                labels: [DASH_LABEL],
              });
              dashIssue = created.data;
              // Pin via GraphQL (requires issues:write)
              try {
                await github.graphql(
                  `mutation($id: ID!) {
                    pinIssue(input: { issueId: $id }) { pinnedIssue { issue { number } } }
                  }`,
                  { id: dashIssue.node_id },
                );
                core.info(`Pinned triage dashboard issue #${dashIssue.number}`);
              } catch (e) {
                core.warning(`Could not pin dashboard issue: ${e.message}`);
              }
            }

            // Build and post summary
            const runDate = new Date().toISOString().slice(0, 10);
            const lines = [
              `## Atlas Triage Summary — ${runDate}`,
              '',
              `| metric | count |`,
              `|--------|-------|`,
              `| open \`role:atlas\` | ${atlasIssues.length} |`,
              `| stale (>72 h) | ${staleCt} |`,
              `| newly escalated | ${escalatedCt} |`,
              `| already escalated (skipped) | ${skippedCt} |`,
            ];
            if (staleLinks.length > 0) {
              lines.push('', '### Stale issues');
              for (const { number, title, url, status } of staleLinks) {
                lines.push(`- [#${number} ${title}](${url}) — ${status}`);
              }
            }
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: dashIssue.number,
              body: lines.join('\n'),
            });

            core.info(
              `stale=${staleCt} escalated=${escalatedCt} skipped=${skippedCt} dashboard=#${dashIssue.number}`,
            );
