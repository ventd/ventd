name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # v0.3.0 acceptance gate: every PR runs this matrix on all four
  # distros. A single-distro green is no longer sufficient for merge.
  # See release-notes/v0.3.0-plan.md.
  #
  # CHECK-NAME DISCIPLINE (issue #121):
  # The `name:` of each matrix row is the literal status-check name
  # that GitHub reports on a PR, and the repo ruleset pins those
  # names verbatim (`.github/rulesets/main.json`). Do NOT derive the
  # check name from `${{ matrix.distro }}` or any other matrix
  # variable — bumping `ubuntu-24.04` to `ubuntu-24.10` would then
  # silently rename the check and the ruleset would block every PR
  # with a check that never reports. Keep `matrix.name` decoupled
  # from distro/container values; if a row is renamed, added, or
  # removed, `.github/rulesets/main.json` must be updated in the
  # same PR and re-applied to GitHub after merge (see
  # `.github/rulesets/README.md`).
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: build-and-test-ubuntu
            distro: ubuntu-24.04
            container: ""
            prereqs: ""
            use-setup-go: true
            race: true
          - name: build-and-test-fedora
            distro: fedora-41
            container: "fedora:41"
            prereqs: "dnf install -y git gcc tar which"
            use-setup-go: true
            race: true
          - name: build-and-test-arch
            distro: arch
            container: "archlinux:latest"
            prereqs: "pacman -Sy --noconfirm git gcc tar which"
            use-setup-go: true
            race: true
          # Alpine uses the upstream Go 1.25 tarball rather than apk's
          # `go` package (which lags behind and refuses to build a
          # go.mod with `go 1.25.0`). The race detector needs cgo, and
          # .claude/rules/usability.md requires the binary stay
          # libc-only — so we build with CGO_ENABLED=0 and skip -race
          # on this row. Race coverage comes from the other three
          # distros; Alpine's job is to prove the code compiles and
          # passes tests under musl.
          - name: build-and-test-alpine
            distro: alpine-3.20
            container: "alpine:3.20"
            prereqs: "apk add --no-cache bash ca-certificates curl git tar"
            use-setup-go: false
            race: false
    steps:
      - name: Install prerequisites
        if: matrix.prereqs != ''
        run: ${{ matrix.prereqs }}

      - uses: actions/checkout@v6

      # GitHub-hosted runners stage the workspace as a non-root user,
      # but our matrix containers run as root. `go build` reads VCS
      # metadata via `git`, which then refuses with "dubious ownership"
      # and fails with `error obtaining VCS status: exit status 128`.
      # Allowlist the workspace so VCS stamping still works in
      # containers.
      - name: Trust workspace dir (containers only)
        if: matrix.container != ''
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Go (setup-go)
        if: matrix.use-setup-go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Set up Go (upstream tarball, Alpine)
        if: ${{ !matrix.use-setup-go }}
        run: |
          GO_VERSION=1.25.0
          curl -fsSL -o /tmp/go.tgz \
            "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
          tar -C /usr/local -xzf /tmp/go.tgz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      # Tidy-drift is distro-independent; run only on Ubuntu to avoid
      # false positives from minor toolchain-version differences.
      - name: Verify module tidy
        if: matrix.distro == 'ubuntu-24.04'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: Build (CGO_ENABLED=0)
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" ./cmd/ventd/

      - name: Test with race detector
        if: matrix.race
        run: go test -race -count=1 ./...

      # Alpine row: CGO_ENABLED=0, no -race. See matrix comment above.
      - name: Test (no race, musl)
        if: ${{ !matrix.race }}
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: gofmt
        run: |
          fmt_diff="$(gofmt -l .)"
          if [ -n "$fmt_diff" ]; then
            echo "::error::gofmt drift detected in:"
            echo "$fmt_diff"
            exit 1
          fi
      - name: Install golangci-lint from source (Go 1.25 compatible)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  cross-compile:
    name: cross-compile-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w" -o ventd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ventd/

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint shipped shell scripts (bash entry, POSIX hooks, init scripts)
        # SC1091 silenced — _ventd_account.sh is sourced via dynamic
        # path resolution that shellcheck can't follow statically.
        # SC2034 silenced — OpenRC's `name=` and `description=` vars
        # are consumed by the framework, not by the script body.
        run: |
          set -e
          # bash entry point.
          shellcheck --severity=warning --exclude=SC1091 \
                     --shell=bash scripts/install.sh \
                                  scripts/check-unit-onfailure.sh \
                                  scripts/check-unit-ordering.sh \
                                  packaging/nix/check-drift.sh
          # Deploy-unit regression guard: OnFailure= must live in [Unit],
          # not [Service], or systemd silently ignores it and recovery
          # never fires. See scripts/check-unit-onfailure.sh header.
          bash scripts/check-unit-onfailure.sh deploy/ventd.service
          # Deploy-unit regression guard: After=systemd-udev-settle.service
          # must NOT be present under [Unit] (deprecated since v0.3), and
          # [Service].ExecStartPre= must still invoke ventd-wait-hwmon so
          # the cold-boot hwmon race that ordering used to paper over is
          # closed by the positive readiness gate instead (#86, #95, #98).
          bash scripts/check-unit-ordering.sh deploy/ventd.service
          # Validation harness + self-test. Keep in the bash group because
          # they both rely on process substitution / arrays. postreboot-verify
          # is sourced by test-rig-checks.sh so assert_chip_binding can be
          # driven against fixtures — also covered by this lint pass.
          shellcheck --severity=warning --exclude=SC1091 \
                     --shell=bash validation/run-rig-checks.sh \
                                  validation/test-rig-checks.sh \
                                  validation/postreboot-verify.sh \
                                  validation/install-pwm-holders.test.sh
          # Run the fixture-based self-test for 0a.i / 0a.iii (issue #61)
          # AND the 4h chip-binding assertion (issue #86 verifier gap).
          bash validation/test-rig-checks.sh
          # Issue #107 carve-out: install.sh's PWM-holder preflight must
          # pass on the upgrade path when the only holders are ventd itself.
          bash validation/install-pwm-holders.test.sh
          # POSIX hooks + init scripts. preremove.sh, postinstall.sh
          # and _ventd_account.sh all run under dash on Debian.
          shellcheck --severity=warning --exclude=SC1091,SC2034 \
                     --shell=sh scripts/postinstall.sh \
                                scripts/preremove.sh \
                                scripts/_ventd_account.sh \
                                scripts/ventd.openrc \
                                scripts/ventd.runit

  nix-drift:
    # #147: packaging/nix/nixos-module.nix used to inline every sandbox
    # directive from deploy/ventd.service and the full text of
    # deploy/90-ventd-hwmon.rules. The module now reads those files
    # directly, but this job is the belt-and-braces guard that asserts
    # the single-source-of-truth invariant still holds — i.e. that
    # nobody has quietly reinstated an inline copy in the Nix module
    # or added a substituteUnit rewrite that silently weakens the
    # rendered unit.
    name: nix-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert nix module tracks deploy/ without drift
        run: bash packaging/nix/check-drift.sh
