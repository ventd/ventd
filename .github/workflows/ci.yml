name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.x"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify module tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: Build (CGO_ENABLED=0)
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" ./cmd/ventd/

      - name: Test with race detector
        run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: Install golangci-lint from source (Go 1.25 compatible)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  cross-compile:
    name: cross-compile-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w" -o ventd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ventd/

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint shipped shell scripts (bash entry, POSIX hooks, init scripts)
        # SC1091 silenced — _ventd_account.sh is sourced via dynamic
        # path resolution that shellcheck can't follow statically.
        # SC2034 silenced — OpenRC's `name=` and `description=` vars
        # are consumed by the framework, not by the script body.
        run: |
          set -e
          # bash entry point.
          shellcheck --severity=warning --exclude=SC1091 \
                     --shell=bash scripts/install.sh \
                                  scripts/check-unit-onfailure.sh \
                                  scripts/check-unit-ordering.sh
          # Deploy-unit regression guard: OnFailure= must live in [Unit],
          # not [Service], or systemd silently ignores it and recovery
          # never fires. See scripts/check-unit-onfailure.sh header.
          bash scripts/check-unit-onfailure.sh deploy/ventd.service
          # Deploy-unit regression guard: After=systemd-udev-settle.service
          # must be present under [Unit] so multi-chip boards don't race
          # between udev and ventd's resolver on cold boot (#86).
          bash scripts/check-unit-ordering.sh deploy/ventd.service
          # Validation harness + self-test. Keep in the bash group because
          # they both rely on process substitution / arrays. postreboot-verify
          # is sourced by test-rig-checks.sh so assert_chip_binding can be
          # driven against fixtures — also covered by this lint pass.
          shellcheck --severity=warning --exclude=SC1091 \
                     --shell=bash validation/run-rig-checks.sh \
                                  validation/test-rig-checks.sh \
                                  validation/postreboot-verify.sh \
                                  validation/install-pwm-holders.test.sh
          # Run the fixture-based self-test for 0a.i / 0a.iii (issue #61)
          # AND the 4h chip-binding assertion (issue #86 verifier gap).
          bash validation/test-rig-checks.sh
          # Issue #107 carve-out: install.sh's PWM-holder preflight must
          # pass on the upgrade path when the only holders are ventd itself.
          bash validation/install-pwm-holders.test.sh
          # POSIX hooks + init scripts. preremove.sh, postinstall.sh
          # and _ventd_account.sh all run under dash on Debian.
          shellcheck --severity=warning --exclude=SC1091,SC2034 \
                     --shell=sh scripts/postinstall.sh \
                                scripts/preremove.sh \
                                scripts/_ventd_account.sh \
                                scripts/ventd.openrc \
                                scripts/ventd.runit
