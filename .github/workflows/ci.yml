name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # v0.3.0 acceptance gate: every PR runs this matrix on four amd64
  # distros (ubuntu, fedora, arch, alpine) plus an ubuntu arm64 lane
  # (#174). A single-distro green is no longer sufficient for merge.
  # See release-notes/v0.3.0-plan.md.
  #
  # CHECK-NAME DISCIPLINE (issue #121):
  # The `name:` of each matrix row is the literal status-check name
  # that GitHub reports on a PR, and the repo ruleset pins those
  # names verbatim (`.github/rulesets/main.json`). Do NOT derive the
  # check name from `${{ matrix.distro }}` or any other matrix
  # variable — bumping `ubuntu-24.04` to `ubuntu-24.10` would then
  # silently rename the check and the ruleset would block every PR
  # with a check that never reports. Keep `matrix.name` decoupled
  # from distro/container values; if a row is renamed, added, or
  # removed, `.github/rulesets/main.json` must be updated in the
  # same PR and re-applied to GitHub after merge (see
  # `.github/rulesets/README.md`).
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: build-and-test-ubuntu
            distro: ubuntu-24.04
            runs-on: ubuntu-24.04
            container: ""
            prereqs: ""
            use-setup-go: true
            race: true
          # arm64 native lane (#174). The existing `cross-compile` job
          # only validates that the binary links for GOARCH=arm64 — it
          # never runs the tests and never exercises the race detector
          # (which requires native execution). `ubuntu-24.04-arm` is a
          # GitHub-hosted arm64 runner, free for public repos since
          # Aug 2025 GA. Running the full race-enabled test suite on
          # native arm64 catches alignment and NVML dlopen issues that
          # the amd64 lanes cannot.
          - name: build-and-test-ubuntu-arm64
            distro: ubuntu-24.04-arm
            runs-on: ubuntu-24.04-arm
            container: ""
            prereqs: ""
            use-setup-go: true
            race: true
          - name: build-and-test-fedora
            distro: fedora-41
            runs-on: ubuntu-24.04
            container: "fedora@sha256:f1a3fab47bcb3c3ddf3135d5ee7ba8b7b25f2e809a47440936212a3a50957f3d" # fedora:41
            prereqs: "dnf install -y git gcc tar which"
            use-setup-go: true
            race: true
          - name: build-and-test-arch
            distro: arch
            runs-on: ubuntu-24.04
            container: "archlinux@sha256:d0adc0bcc3bdfeacf9f30abd853c8d4d1dd40b6363e17cc158312a40423e063b" # archlinux:latest
            prereqs: "pacman -Sy --noconfirm git gcc tar which"
            use-setup-go: true
            race: true
          # Alpine uses the upstream Go 1.25 tarball rather than apk's
          # `go` package (which lags behind and refuses to build a
          # go.mod with `go 1.25.0`). The race detector needs cgo, and
          # .claude/rules/usability.md requires the binary stay
          # libc-only — so we build with CGO_ENABLED=0 and skip -race
          # on this row. Race coverage comes from the other three
          # distros; Alpine's job is to prove the code compiles and
          # passes tests under musl.
          - name: build-and-test-alpine
            distro: alpine-3.20
            runs-on: ubuntu-24.04
            container: "alpine@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc" # alpine:3.20
            prereqs: "apk add --no-cache bash ca-certificates curl git tar"
            use-setup-go: false
            race: false
    steps:
      - name: Install prerequisites
        if: matrix.prereqs != ''
        run: ${{ matrix.prereqs }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # GitHub-hosted runners stage the workspace as a non-root user,
      # but our matrix containers run as root. `go build` reads VCS
      # metadata via `git`, which then refuses with "dubious ownership"
      # and fails with `error obtaining VCS status: exit status 128`.
      # Allowlist the workspace so VCS stamping still works in
      # containers.
      - name: Trust workspace dir (containers only)
        if: matrix.container != ''
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # AppArmor profile smoke (#210). `apparmor_parser -QK` is
      # parse-only (`-Q` skips the kernel load, `-K` skips the cache),
      # so it runs fine in containers and on hosts that don't have
      # AppArmor enabled. Catches grammar regressions like #202 — the
      # `network inet6 stream,` form that parser 4.1.0 rejected — before
      # they ship. Runs on the Ubuntu amd64 and arm64 host lanes and the
      # Alpine container lane (musl userspace + a different apparmor
      # build). Fedora and Arch are SELinux-native and skip the step.
      # Debian 13 trixie (parser 4.1.0, the specific regression env from
      # #202) has its own dedicated job below.
      - name: Parse AppArmor profile (Ubuntu host)
        if: matrix.container == ''
        run: |
          # Issue #805: GitHub Actions ubuntu-latest defaults to
          # azure.archive.ubuntu.com, which intermittently DNS-fails
          # ("Temporary failure resolving"). Switch to the canonical
          # archive.ubuntu.com mirror first, then retry the install up
          # to three times against whichever mirror is reachable.
          sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' \
            /etc/apt/sources.list.d/ubuntu.sources \
            /etc/apt/sources.list 2>/dev/null || true
          for i in 1 2 3; do
            if sudo apt-get update && \
               sudo apt-get install -y --no-install-recommends apparmor-utils; then
              break
            fi
            echo "apt attempt $i failed; sleeping 30s before retry"
            sleep 30
          done
          # Verify the parser landed; surface a clear error if all
          # three retries failed (rather than the cryptic "command not
          # found" from the next step).
          command -v apparmor_parser >/dev/null || {
            echo "apparmor_parser not installed after 3 retries — see issue #805" >&2
            exit 1
          }
          sudo apparmor_parser -QK deploy/apparmor.d/ventd
          sudo apparmor_parser -QK deploy/apparmor.d/ventd-ipmi

      - name: Parse AppArmor profile (Alpine container)
        if: contains(matrix.container, 'alpine')
        run: |
          apk add --no-cache apparmor apparmor-utils
          # Alpine's apparmor 3.1.7 package ships the parser but not
          # the Debian/Ubuntu tunables+abstractions tree that the
          # shipped profile `#include`s. We're running a grammar-only
          # check (`-QK`), not a runtime-semantics test, so stub the
          # referenced include files if (and only if) they are not
          # already present. Real distros get the real includes; this
          # stub only kicks in when the package manager didn't supply
          # them.
          for f in tunables/global abstractions/base abstractions/nameservice abi/4.0; do
            dest="/etc/apparmor.d/$f"
            mkdir -p "$(dirname "$dest")"
            [ -s "$dest" ] || printf '# CI include stub\n' > "$dest"
          done
          apparmor_parser -QK deploy/apparmor.d/ventd
          apparmor_parser -QK deploy/apparmor.d/ventd-ipmi

      - name: Set up Go (setup-go)
        if: matrix.use-setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: true

      - name: Set up Go (upstream tarball, Alpine)
        if: ${{ !matrix.use-setup-go }}
        run: |
          GO_VERSION=1.25.0
          GO_SHA256=2852af0cb20a13139b3448992e69b868e50ed0f8a1e5940ee1de9e19a123b613
          curl -fsSL -o /tmp/go.tgz \
            "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
          echo "${GO_SHA256}  /tmp/go.tgz" | sha256sum -c -
          tar -C /usr/local -xzf /tmp/go.tgz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      # Tidy-drift is distro-independent; run only on Ubuntu to avoid
      # false positives from minor toolchain-version differences.
      - name: Verify module tidy
        if: matrix.distro == 'ubuntu-24.04'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: Build (CGO_ENABLED=0)
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" ./cmd/ventd/

      - name: Build with nonvidia tag
        if: matrix.distro == 'ubuntu-24.04'
        env:
          CGO_ENABLED: "0"
        run: go build -tags nonvidia ./...

      - name: Binary size drift check
        if: matrix.distro == 'ubuntu-24.04'
        run: |
          CGO_ENABLED=0 go build -ldflags='-s -w' -o /tmp/ventd-current ./cmd/ventd
          CURRENT=$(stat -c%s /tmp/ventd-current)
          BASELINE=$(grep '^BYTES=' docs/binary_size_baseline | cut -d= -f2)
          DRIFT_PCT=$(( (CURRENT - BASELINE) * 100 / BASELINE ))
          echo "baseline=$BASELINE current=$CURRENT drift=${DRIFT_PCT}%"
          if [ $DRIFT_PCT -gt 10 ]; then
            echo "::warning::binary size grew ${DRIFT_PCT}% above baseline"
          fi
          if [ $DRIFT_PCT -gt 25 ]; then
            echo "::error::binary size grew ${DRIFT_PCT}% above baseline (block threshold)"
            exit 1
          fi

      - name: Test with race detector
        if: matrix.race
        # retry-flaky.sh runs the suite once; if any failures are listed in
        # .github/flaky-tests.yaml, those tests are re-run once. Second
        # failure is real. Tests not in the registry never get retried.
        run: ./scripts/retry-flaky.sh -race -count=1 ./...

      # Alpine row: CGO_ENABLED=0, no -race. See matrix comment above.
      - name: Test (no race, musl)
        if: ${{ !matrix.race }}
        env:
          CGO_ENABLED: "0"
        run: ./scripts/retry-flaky.sh -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: true
      - name: gofmt
        run: |
          fmt_diff="$(gofmt -l .)"
          if [ -n "$fmt_diff" ]; then
            echo "::error::gofmt drift detected in:"
            echo "$fmt_diff"
            exit 1
          fi
      - name: Install golangci-lint from source (Go 1.25 compatible)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  cross-compile:
    name: cross-compile-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w" -o ventd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ventd/

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Lint shipped shell scripts (bash entry, POSIX hooks, init scripts)
        # SC1091 silenced — _ventd_account.sh is sourced via dynamic
        # path resolution that shellcheck can't follow statically.
        # SC2034 silenced — OpenRC's `name=` and `description=` vars
        # are consumed by the framework, not by the script body.
        run: |
          set -e
          # bash entry point.
          shellcheck --severity=warning --exclude=SC1091 \
                     --shell=bash scripts/install.sh \
                                  scripts/check-unit-onfailure.sh \
                                  scripts/check-unit-ordering.sh \
                                  packaging/nix/check-drift.sh
          # Deploy-unit regression guard: OnFailure= must live in [Unit],
          # not [Service], or systemd silently ignores it and recovery
          # never fires. See scripts/check-unit-onfailure.sh header.
          bash scripts/check-unit-onfailure.sh deploy/ventd.service
          # Deploy-unit regression guard: After=systemd-udev-settle.service
          # must NOT be present under [Unit] (deprecated since v0.3), and
          # [Service].ExecStartPre= must still invoke ventd-wait-hwmon so
          # the cold-boot hwmon race that ordering used to paper over is
          # closed by the positive readiness gate instead (#86, #95, #98).
          bash scripts/check-unit-ordering.sh deploy/ventd.service
          # Validation harness + self-test. Keep in the bash group because
          # they both rely on process substitution / arrays. postreboot-verify
          # is sourced by test-rig-checks.sh so assert_chip_binding can be
          # driven against fixtures — also covered by this lint pass.
          shellcheck --severity=warning --exclude=SC1091 \
                     --shell=bash validation/run-rig-checks.sh \
                                  validation/test-rig-checks.sh \
                                  validation/postreboot-verify.sh \
                                  validation/install-pwm-holders.test.sh
          # Run the fixture-based self-test for 0a.i / 0a.iii (issue #61)
          # AND the 4h chip-binding assertion (issue #86 verifier gap).
          bash validation/test-rig-checks.sh
          # Issue #107 carve-out: install.sh's PWM-holder preflight must
          # pass on the upgrade path when the only holders are ventd itself.
          bash validation/install-pwm-holders.test.sh
          # POSIX hooks + init scripts. preremove.sh, postinstall.sh
          # and _ventd_account.sh all run under dash on Debian.
          shellcheck --severity=warning --exclude=SC1091,SC2034 \
                     --shell=sh scripts/postinstall.sh \
                                scripts/preremove.sh \
                                scripts/_ventd_account.sh \
                                scripts/ventd.openrc \
                                scripts/ventd.runit

  nix-drift:
    # #147: packaging/nix/nixos-module.nix used to inline every sandbox
    # directive from deploy/ventd.service and the full text of
    # deploy/90-ventd-hwmon.rules. The module now reads those files
    # directly, but this job is the belt-and-braces guard that asserts
    # the single-source-of-truth invariant still holds — i.e. that
    # nobody has quietly reinstated an inline copy in the Nix module
    # or added a substituteUnit rewrite that silently weakens the
    # rendered unit.
    name: nix-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Assert nix module tracks deploy/ without drift
        run: bash packaging/nix/check-drift.sh

  # Debian 13 trixie (parser 4.1.0) is the specific grammar that
  # rejected `network inet6 stream,` in #202, silently downgrading
  # ventd's AppArmor confinement on every install. The fix landed in
  # #204, but the main build matrix doesn't include Debian, so a future
  # grammar-asymmetry regression would still slip through. This
  # standalone parse-only lane closes that gap (#210). Parse-only
  # (`-QK`) means the container doesn't need an AppArmor-capable kernel
  # — the job just runs `apparmor_parser` against the shipped profile
  # and fails the PR if the grammar drifts.
  #
  # Note: this job depends on the `debian:trixie` Docker Hub tag. If
  # Debian drops or renames the tag post-release, update to the
  # concrete version tag (e.g. `debian:13`) in the same PR that
  # refreshes the ruleset.
  apparmor-parse-debian13:
    name: apparmor-parse-debian13
    runs-on: ubuntu-24.04
    container: "debian@sha256:3352c2e13876c8a5c5873ef20870e1939e73cb9a3c1aeba5e3e72172a85ce9ed" # debian:trixie
    steps:
      - name: Install apparmor-utils and git
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            apparmor-utils git ca-certificates
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Trust workspace dir
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Parse AppArmor profile
        run: |
          apparmor_parser -QK deploy/apparmor.d/ventd
          apparmor_parser -QK deploy/apparmor.d/ventd-ipmi
