name: release-changelog

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to generate CHANGELOG for'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install git-cliff
        uses: taiki-e/install-action@787505cde8a44ea468a00478fe52baf23b15bccd # v2.75.21
        with:
          tool: git-cliff@2

      - name: Generate CHANGELOG
        run: git-cliff --tag "${{ steps.tag.outputs.value }}" --output CHANGELOG.md

      - name: Open PR with generated CHANGELOG
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          commit-message: "chore(release): update CHANGELOG for ${{ steps.tag.outputs.value }}"
          title: "chore(release): CHANGELOG for ${{ steps.tag.outputs.value }}"
          body: "Auto-generated by release-changelog.yml. See cliff.toml for config."
          branch: "release/changelog-${{ steps.tag.outputs.value }}"
          base: main
          delete-branch: true
          labels: "area/docs, type:chore"
          draft: false
