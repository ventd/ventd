name: release-changelog

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@3f4b1b8ba8b234d895d3bba1cfdd20b9c8826a33 # git-cliff@v2
        with:
          tool: git-cliff@2

      - name: Generate CHANGELOG.md
        run: git-cliff --tag "${{ github.ref_name }}" --output CHANGELOG.md

      - name: Open PR with updated CHANGELOG
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb2b58c9 # v7.0.8
        with:
          commit-message: "chore(release): update CHANGELOG for ${{ github.ref_name }}"
          branch: "chore/changelog-${{ github.ref_name }}"
          delete-branch: true
          title: "chore(release): CHANGELOG for ${{ github.ref_name }}"
          body: |
            Auto-generated by the release-changelog workflow on tag `${{ github.ref_name }}`.

            Merge after the release CI passes.
          labels: "chore"
          draft: false
