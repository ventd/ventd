name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # Weekly scan to catch CVE disclosures that land between commits.
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # repo-checkout: false suppresses the nested actions/checkout@v4.1.1 baked
      # into govulncheck-action v1.0.4. Without it, the nested v4 checkout
      # layers an http.extraheader Authorization on top of the v6 top-level
      # checkout's includeIf.gitdir credentials, producing a duplicate
      # Authorization header and HTTP 400 on fetch. See #40.
      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: "1.25.x"
          go-package: ./...
          repo-checkout: "false"
