
version: 2

project_name: ventd

before:
  hooks:
    - go mod tidy

builds:
  # Default glibc build — includes NVML via purego (dynamically linked against glibc).
  - id: ventd
    main: ./cmd/ventd
    binary: ventd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.CommitTimestamp}}

  # ventd-recover: emergency fan restore oneshot. Installed to
  # /usr/local/sbin and invoked by ventd-recover.service via OnFailure=
  # on the main ventd.service when the daemon exits unexpectedly.
  - id: ventd-recover
    main: ./cmd/ventd-recover
    binary: ventd-recover
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - -s -w

  # ventd-ipmi: privilege-separated IPMI sidecar. Installed to
  # /usr/libexec/ventd/ventd-ipmi. Holds CAP_SYS_RAWIO + /dev/ipmi0 access
  # so the main ventd daemon can run without any IPMI capability.
  - id: ventd-ipmi
    main: ./cmd/ventd-ipmi
    binary: ventd-ipmi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - -s -w

  # ventd-nvml-helper: SUID-root helper for NVML write operations
  # (#770). The unprivileged ventd daemon dispatches to this helper
  # when it needs to call nvmlDeviceSetFanSpeed_v2 et al, which NVML
  # gates on root euid. Installed to /usr/local/sbin with mode 04755.
  # The helper is intentionally tiny (~150 LOC) and validates every
  # numeric input against bounded ranges before any NVML touch.
  - id: ventd-nvml-helper
    main: ./cmd/ventd-nvml-helper
    binary: ventd-nvml-helper
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - -s -w

  # ventd-setup: split-daemon Phase A privileged-operations broker.
  # systemd starts it on demand from the wizard; reads
  # /run/ventd/setup-request.json, dispatches to internal/setupbroker,
  # writes /run/ventd/setup-result.json, exits. Phase A ships the
  # binary alongside the existing root ventd.service but the wizard
  # doesn't yet route through it (every operation is the broker's
  # ErrOperationNotImpl stub). Phase B (a future PR) flips ventd to
  # User=ventd + restores the AppArmor sandbox, with privileged
  # operations actually dispatching through this binary. See
  # specs/spec-v0_6_0-split-daemon.md.
  - id: ventd-setup
    main: ./cmd/ventd-setup
    binary: ventd-setup
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - -s -w

  # musl-compatible build — fully static, NVIDIA support compiled out.
  # Required for Alpine, Void-musl, and other musl-libc distros where
  # purego's fakecgo shim would drag in glibc SONAMEs and fail to exec.
  - id: ventd-musl
    main: ./cmd/ventd
    binary: ventd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    tags:
      - nonvidia
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.CommitTimestamp}}

archives:
  - id: default
    ids:
      - ventd
      - ventd-recover
      - ventd-ipmi
      - ventd-nvml-helper
      - ventd-setup
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - config.example.yaml
      - deploy/ventd.service
      - deploy/ventd-recover.service
      - deploy/ventd-postreboot-verify.service
      - deploy/ventd-ipmi.service
      - deploy/ventd-setup.service
      - deploy/postreboot-verify.sh
      - deploy/90-ventd-hwmon.rules
      - deploy/apparmor.d/ventd
      - deploy/apparmor.d/ventd.compat
      - deploy/apparmor.d/ventd-ipmi
      - deploy/selinux/ventd.te
      - deploy/selinux/ventd.fc
      - deploy/selinux/Makefile
      - deploy/tmpfiles.d-ventd.conf
      - deploy/sysusers.d-ventd.conf
      - deploy/sysusers.d-ventd-ipmi.conf
      - scripts/ventd.openrc
      - scripts/ventd.runit
      - scripts/install.sh
      - scripts/postinstall.sh
      - scripts/_ventd_account.sh
      - scripts/ventd-wait-hwmon
  - id: musl
    ids:
      - ventd-musl
      - ventd-recover
      - ventd-ipmi
      - ventd-setup
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_musl"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - config.example.yaml
      - deploy/ventd.service
      - deploy/ventd-recover.service
      - deploy/ventd-postreboot-verify.service
      - deploy/ventd-ipmi.service
      - deploy/ventd-setup.service
      - deploy/postreboot-verify.sh
      - deploy/90-ventd-hwmon.rules
      - deploy/apparmor.d/ventd
      - deploy/apparmor.d/ventd.compat
      - deploy/apparmor.d/ventd-ipmi
      - deploy/selinux/ventd.te
      - deploy/selinux/ventd.fc
      - deploy/selinux/Makefile
      - deploy/tmpfiles.d-ventd.conf
      - deploy/sysusers.d-ventd.conf
      - deploy/sysusers.d-ventd-ipmi.conf
      - scripts/ventd.openrc
      - scripts/ventd.runit
      - scripts/install.sh
      - scripts/postinstall.sh
      - scripts/_ventd_account.sh
      - scripts/ventd-wait-hwmon

sboms:
  - id: cyclonedx
    artifacts: archive
    documents:
      - "${artifact}.cdx.json"
    cmd: syft
    args: ["${artifact}", "--output", "cyclonedx-json=${document}"]
  - id: spdx
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"
    cmd: syft
    args: ["${artifact}", "--output", "spdx-json=${document}"]

signs:
  - cmd: cosign
    artifacts: all
    output: true
    signature: "${artifact}.bundle"
    args:
      - "sign-blob"
      - "--bundle=${artifact}.bundle"
      - "--yes"
      - "${artifact}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

nfpms:
  - id: ventd-pkg
    ids:
      - ventd
      - ventd-nvml-helper
      - ventd-setup
    package_name: ventd
    vendor: ventd
    homepage: https://github.com/ventd/ventd
    maintainer: ventd maintainers <maintainers@ventd.io>
    description: |
      Automatic Linux fan control daemon. Auto-detects hardware,
      auto-calibrates, auto-recovers — set and forget.
    license: GPL-3.0
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: deploy/ventd.service
        dst: /lib/systemd/system/ventd.service
      - src: deploy/ventd-recover.service
        dst: /lib/systemd/system/ventd-recover.service
      - src: deploy/ventd-postreboot-verify.service
        dst: /lib/systemd/system/ventd-postreboot-verify.service
      # Split-daemon Phase A: ship ventd-setup.service alongside the
      # main unit so the binary is reachable via systemctl. The wizard
      # doesn't yet route through it (Phase B). See
      # specs/spec-v0_6_0-split-daemon.md.
      - src: deploy/ventd-setup.service
        dst: /lib/systemd/system/ventd-setup.service
      - src: deploy/postreboot-verify.sh
        dst: /usr/local/sbin/ventd-postreboot-verify.sh
        file_info:
          mode: 0755
      - src: deploy/90-ventd-hwmon.rules
        dst: /lib/udev/rules.d/90-ventd-hwmon.rules
      - src: deploy/apparmor.d/ventd
        dst: /etc/apparmor.d/ventd
      - src: deploy/apparmor.d/ventd.compat
        dst: /etc/apparmor.d/ventd.compat
      - src: deploy/apparmor.d/ventd-ipmi
        dst: /etc/apparmor.d/ventd-ipmi
      - src: deploy/selinux/ventd.te
        dst: /usr/share/selinux/ventd/ventd.te
      - src: deploy/selinux/ventd.fc
        dst: /usr/share/selinux/ventd/ventd.fc
      - src: deploy/selinux/Makefile
        dst: /usr/share/selinux/ventd/Makefile
      - src: scripts/_ventd_account.sh
        dst: /usr/share/ventd/_ventd_account.sh
      # CHANGELOG.md ships under /usr/share/doc/ventd/ so the daemon
      # can read it at runtime for the in-UI release-notes modal
      # (#48 — patch-notes-on-first-login after an update).
      - src: CHANGELOG.md
        dst: /usr/share/doc/ventd/CHANGELOG.md
      # install.sh ships in the same docs dir so the in-UI Update
      # button (#934) can find it via the candidate list in
      # internal/web/update.go::updateInstallScriptCandidates.
      - src: scripts/install.sh
        dst: /usr/share/ventd/install.sh
        file_info:
          mode: 0755
      - src: scripts/ventd-wait-hwmon
        dst: /usr/local/sbin/ventd-wait-hwmon
        file_info:
          mode: 0755
      - src: config.example.yaml
        dst: /etc/ventd/config.example.yaml
        type: config
    scripts:
      postinstall: scripts/postinstall.sh
      preremove: scripts/preremove.sh

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: ventd
    name: ventd
  draft: false
  prerelease: auto
  name_template: "ventd {{.Version}}"
  # Ship scripts/install.sh as a top-level release asset (in addition
  # to the .deb/.rpm /usr/share/ventd/install.sh copy) so:
  #   1. Operators can `curl -fsSL https://github.com/ventd/ventd/
  #      releases/download/<tag>/install.sh | bash` without going
  #      through the raw-githubusercontent path (which always serves
  #      main, not the tagged version).
  #   2. The daemon's in-UI Update apply handler can fetch the install.sh
  #      that matches the target tag instead of using the binary's
  #      embedded copy. Embedded install.sh is frozen at build time —
  #      a future install.sh fix wouldn't reach existing daemons. With
  #      install.sh as a release asset, every daemon updating to v0.5.X
  #      uses install.sh@v0.5.X, picking up every fix that landed
  #      between its own build and the target version.
  extra_files:
    - glob: scripts/install.sh
