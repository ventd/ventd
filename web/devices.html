<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ventd — devices</title>
<link rel="stylesheet" href="/shared/tokens.css">
<link rel="stylesheet" href="/shared/shell.css">
<link rel="stylesheet" href="/shared/brand.css">
<link rel="stylesheet" href="/shared/ambient.css">
<link rel="stylesheet" href="/devices.css">
</head>
<body>

<div class="ambient-bg" aria-hidden="true">
  <div class="ambient-grid"></div>
  <div class="ambient-glow ambient-glow--a"></div>
  <div class="ambient-glow ambient-glow--b"></div>
  <div class="ambient-glow ambient-glow--c"></div>
</div>

<div class="shell shell-layout">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">ventd</div>
      <div class="brand-version mono" id="sb-version">—</div>
    </div>
    <nav class="nav" aria-label="Primary">
      <div class="nav-section-label">Control</div>
      <a class="nav-item" href="/dashboard" data-page="dashboard"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12l2-2 7 7 9-9 0 0M3 19h18"/></svg>Dashboard</a>
      <a class="nav-item" href="/smart" data-page="smart"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/><path d="M3 12h3M18 12h3M12 3v3M12 18v3"/></svg>Smart mode</a>
      <a class="nav-item" href="/curve-editor" data-page="curve-editor"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>Curves</a>
      <a class="nav-item" href="/schedule" data-page="schedule"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 10h10M7 14h6"/></svg>Schedule</a>
      <div class="nav-section-label">Hardware</div>
      <a class="nav-item" href="/hardware" data-page="hardware"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/></svg>Hardware</a>
      <div class="nav-section-label">System</div>
      <a class="nav-item" href="/settings" data-page="settings"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="live-dot" aria-hidden="true" id="sb-live-dot"></div>
      <span id="sb-live-label">connecting…</span>
    </div>
  </aside>

  <main class="shell-main">

    <div class="topbar">
      <div class="crumbs">
        <span class="crumb">Hardware</span>
        <span class="crumb-sep">/</span>
        <span class="crumb current">Devices</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn--ghost" id="dv-rescan" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 11-3-6.7L21 8M21 3v5h-5"/></svg>
          Rescan
        </button>
        <a class="btn btn--ghost" href="/calibration">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1018 0 9 9 0 00-18 0zM12 8v4l3 2"/></svg>
          Calibrate all
        </a>
        <button class="icon-btn" id="theme-toggle" type="button" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </div>

    <!-- summary strip -->
    <div class="summary-strip">
      <div class="summary-cell">
        <div class="summary-label">Chips</div>
        <div class="summary-value mono" id="sm-chips">—</div>
        <div class="summary-meta" id="sm-chips-meta">—</div>
      </div>
      <div class="summary-cell">
        <div class="summary-label">Fans</div>
        <div class="summary-value mono" id="sm-fans">—</div>
        <div class="summary-meta" id="sm-fans-meta">spinning live</div>
      </div>
      <div class="summary-cell">
        <div class="summary-label">Temps</div>
        <div class="summary-value mono" id="sm-temps">—</div>
        <div class="summary-meta" id="sm-temps-meta">across all chips</div>
      </div>
      <div class="summary-cell">
        <div class="summary-label">Voltages</div>
        <div class="summary-value mono" id="sm-volts">—</div>
        <div class="summary-meta" id="sm-volts-meta">on Super I/O</div>
      </div>
      <div class="summary-cell">
        <div class="summary-label">Last scan</div>
        <div class="summary-value mono" id="sm-scan">—</div>
        <div class="summary-meta">refresh to update</div>
      </div>
    </div>

    <div class="shell-content dv-page">

      <!-- filters -->
      <div class="filter-bar">
        <div class="filter-search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="dv-filter" type="text" placeholder="filter chips, sensors, paths…" autocomplete="off" spellcheck="false" aria-label="Filter devices">
        </div>
        <div class="filter-segments" role="tablist" id="dv-segments">
          <button class="filter-segment is-active" type="button" role="tab" aria-selected="true" data-bus="all">All <span class="seg-count mono" id="sg-all">0</span></button>
          <button class="filter-segment" type="button" role="tab" aria-selected="false" data-bus="hwmon">hwmon <span class="seg-count mono" id="sg-hwmon">0</span></button>
          <button class="filter-segment" type="button" role="tab" aria-selected="false" data-bus="nvml">nvml <span class="seg-count mono" id="sg-nvml">0</span></button>
        </div>
      </div>

      <!-- chip tree -->
      <div class="chip-table" id="dv-chips" role="tree" aria-label="Devices">
        <div class="chip-empty">Scanning hardware…</div>
      </div>

    </div>
  </main>
</div>

<script src="/shared/brand.js"></script>
<script src="/devices.js"></script>
<script src="/shared/release-notes.js" defer></script>
</body>
</html>
